domain: INFRA
type: POSTGRESQLINSTANCE

synthesis:
  rules:
    - ruleName: infra_postgresqlinstance_service_instance_id
      identifier: service.instance.id # host:port
      name: service.instance.id
      encodeIdentifierInGUID: true
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: postgresql.
        - attribute: instrumentation.provider
          value: opentelemetry
      tags:
        otel.library.name:
          entityTagName: instrumentation.name

    - ruleName: infra_postgresqlinstance_entityId
      identifier: entityId
      name: entityKey
      legacyFeatures:
        useNonStandardAttributes: true
        overrideGuidType: true
      prefixedTags:
        label.:
          ttl: PT4H
      conditions:
        - attribute: eventType
          value: 'PostgresqlInstanceSample'
      tags:
        integrationName:
          ttl: P1D
        integrationVersion:
          ttl: P1D
        reportingAgent:
          ttl: P1D
        reportingEndpoint:
          ttl: P1D
    
  tags:
    telemetry.sdk.name:
      entityTagName: instrumentation.provider

goldenTags:
- postgres.host
configuration:
  entityExpirationTime: DAILY
  alertable: true

dashboardTemplates:
  # This should match the entity created from the ohi in the infra pipeline
  newRelic:
    template: newrelic_dashboard.json
  opentelemetry:
    template: opentelemetry_dashboard.stg.json


ownership:
  primaryOwner:
    teamName: "Database Integrations"
