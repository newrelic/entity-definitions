jobThroughput:
  title: Databricks Job Throughput
  unit: REQUESTS_PER_MINUTE
  query:
    select: rate(count(*), 1 minute)
    from: DatabricksJobRun
    where: "event = 'complete'"
    eventId: databricksWorkspaceName
    eventName: databricksWorkspaceName
pipelineUpdateThroughput:
  title: Databricks Pipeline Update Throughput
  unit: REQUESTS_PER_MINUTE
  query:
    select: rate(count(*), 1 minute)
    from: DatabricksPipelineUpdate
    where: "event = 'complete'"
    eventId: databricksWorkspaceName
    eventName: databricksWorkspaceName
queryThroughput:
  title: Databricks Query Throughput
  unit: REQUESTS_PER_MINUTE
  query:
    select: rate(count(*), 1 minute)
    from: DatabricksQuery
    where: "status = 'FINISHED'"
    eventId: databricksWorkspaceName
    eventName: databricksWorkspaceName
