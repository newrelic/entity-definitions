domain: EXT
type: DATABRICKS_WORKSPACE

synthesis:
  rules:
  - ruleName: ext_databricks_workspace_databricksWorkspaceName_1
    identifier: databricksWorkspaceName
    name: databricksWorkspaceName
    encodeIdentifierInGUID: true
    conditions:
    - attribute: eventType
      value: DatabricksJobRunSummary
    - attribute: instrumentation.name
      value: "New Relic Databricks Integration"
    - attribute: instrumentation.provider
      value: "newrelic-labs"
    - attribute: collector.name
      value: "com.newrelic.labs.newrelic-databricks-integration"
    tags:
      databricksWorkspaceId:
        multiValue: false
      databricksWorkspaceName:
        multiValue: false
      databricksWorkspaceUrl:
        multiValue: false

  - ruleName: ext_databricks_workspace_databricksWorkspaceName_2
    identifier: databricksWorkspaceName
    name: databricksWorkspaceName
    encodeIdentifierInGUID: true
    conditions:
    - attribute: eventType
      value: DatabricksPipelineSummary
    - attribute: instrumentation.name
      value: "New Relic Databricks Integration"
    - attribute: instrumentation.provider
      value: "newrelic-labs"
    - attribute: collector.name
      value: "com.newrelic.labs.newrelic-databricks-integration"
    tags:
      databricksWorkspaceId:
        multiValue: false
      databricksWorkspaceName:
        multiValue: false
      databricksWorkspaceUrl:
        multiValue: false

dashboardTemplates:
  newRelic:
    template: dashboard.json
    filterNRQLByEntityID: false

configuration:
  alertable: true

ownership:
  primaryOwner:
    teamName: "no owner"
