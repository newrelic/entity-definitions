transactions:
  title: Transactions
  unit: COUNT
  queries:
    azure:
      select: sum(azure.storage.storageaccounts.fileservices.Transactions)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
availability:
  title: Availability
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.storage.storageaccounts.fileservices.Availability)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
fileCapacity:
  title: File Capacity
  unit: BYTES
  queries:
    azure:
      select: average(azure.storage.storageaccounts.fileservices.FileCapacity)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
percentFileShareUtilization:
  title: Percent File Share Utilization
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.storage.storageaccounts.fileservices.PercentFileShareUtilization)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
