readThroughput:
  title: Read Throughput
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.nosql.read.throughput`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
writeThroughput:
  title: Write Throughput
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.nosql.write.throughput`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
readLatency:
  title: Read Latency
  unit: MS
  queries:
    oci:
      select: average(`oci.nosql.read.latency`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
writeLatency:
  title: Write Latency
  unit: MS
  queries:
    oci:
      select: average(`oci.nosql.write.latency`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
throttledRequests:
  title: Throttled Requests
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.nosql.throttled.requests`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
storageUtilization:
  title: Storage Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(`oci.nosql.storage.utilization`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
