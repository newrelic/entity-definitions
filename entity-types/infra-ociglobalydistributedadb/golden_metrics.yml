shardCount:
  title: Shard Count
  unit: COUNT
  queries:
    oci:
      select: latest(`oci.globdistadb.shard.count`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
crossShardQueryRate:
  title: Cross-Shard Query Rate
  unit: COUNT
  queries:
    oci:
      select: rate(sum(`oci.globdistadb.cross.shard.query.rate`), 1 second)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
shardHealth:
  title: Shard Health
  unit: COUNT
  queries:
    oci:
      select: latest(`oci.globdistadb.shard.health`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
storageUtilization:
  title: Storage Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(`oci.globdistadb.storage.utilization`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
replicationLag:
  title: Replication Lag
  unit: SECONDS
  queries:
    oci:
      select: average(`oci.globdistadb.replication.lag`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
