totalCalls:
  title: Total calls
  unit: COUNT
  queries:
    azure:
      select: sum(azure.cognitiveservices.accounts.TotalCalls)
      eventId: entity.guid
      eventName: entity.name
successfulCalls:
  title: Successful calls
  unit: COUNT
  queries:
    azure:
      select: sum(azure.cognitiveservices.accounts.SuccessfulCalls)
      eventId: entity.guid
      eventName: entity.name
latency:
  title: Latency
  unit: MS
  queries:
    azure:
      select: average(azure.cognitiveservices.accounts.Latency)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
successRate:
  title: Success rate
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.cognitiveservices.accounts.SuccessRate)
      eventId: entity.guid
      eventName: entity.name
totalTokens:
  title: Total tokens
  unit: COUNT
  queries:
    azure:
      select: sum(azure.cognitiveservices.accounts.TotalTokens)
      eventId: entity.guid
      eventName: entity.name
serverErrors:
  title: Server errors
  unit: COUNT
  queries:
    azure:
      select: sum(azure.cognitiveservices.accounts.ServerErrors)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
