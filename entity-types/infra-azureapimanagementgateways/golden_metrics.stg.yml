cpuPercent:
  title: CPU utilization (%)
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.apimanagement.gateways.CpuPercent_Gateway)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
memoryPercent:
  title: Memory utilization (%)
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.apimanagement.gateways.MemoryPercent_Gateway)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
