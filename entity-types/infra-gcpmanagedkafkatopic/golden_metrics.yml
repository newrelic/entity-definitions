messageInCount:
  title: Messages In
  unit: COUNT
  queries:
    gcp:
      select: sum(gcp.managedkafka.message_in_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

byteInCount:
  title: Bytes In
  unit: BYTES
  queries:
    gcp:
      select: sum(gcp.managedkafka.byte_in_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

topicErrorCount:
  title: Topic Errors
  unit: COUNT
  queries:
    gcp:
      select: sum(gcp.managedkafka.topic_error_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
