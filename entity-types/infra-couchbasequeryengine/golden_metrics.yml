activeRequests:
  title: Active Requests
  unit: COUNT
  query:
    select: average(`queryengine.activeRequests`)
    from: CouchbaseQueryEngineSample
    eventId: entityGuid
    eventObjectId: ENTITY_GUIDS
averageRequestTime:
  title: Average Request Time
  unit: MS
  query:
    select: average(`queryengine.averageRequestTimeInMilliseconds`)
    from: CouchbaseQueryEngineSample
    eventId: entityGuid
    eventObjectId: ENTITY_GUIDS
requestsPerSecond:
  title: Requests Per Second
  unit: REQUESTS_PER_SECOND
  query:
    select: average(`queryengine.requestsLast1MinutesPerSecond`)
    from: CouchbaseQueryEngineSample
    eventId: entityGuid
    eventObjectId: ENTITY_GUIDS
cpuUtilization:
  title: CPU Utilization
  unit: PERCENTAGE
  query:
    select: (average(`queryengine.systemCPUUtilization`) + average(`queryengine.userCPUUtilization`)) * 100
    from: CouchbaseQueryEngineSample
    eventId: entityGuid
    eventObjectId: ENTITY_GUIDS
memoryUtilization:
  title: Memory Utilization
  unit: PERCENTAGE
  query:
    select: (average(`queryengine.usedMemoryInBytes`) / average(`queryengine.totalMemoryInBytes`)) * 100
    from: CouchbaseQueryEngineSample
    eventId: entityGuid
    eventObjectId: ENTITY_GUIDS
requestTime95thPercentile:
  title: 95th Percentile Request Time
  unit: MS
  query:
    select: average(`queryengine.requestTime95thPercentileInMilliseconds`)
    from: CouchbaseQueryEngineSample
    eventId: entityGuid
    eventObjectId: ENTITY_GUIDS
