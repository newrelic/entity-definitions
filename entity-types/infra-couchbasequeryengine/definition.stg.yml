domain: INFRA
type: COUCHBASEQUERYENGINE

synthesis:
  rules:
    - ruleName: CouchbaseQueryEngineFromDB
      identifier: entityId
      name: entityName
      legacyFeatures:
        useNonStandardAttributes: true
        overrideGuidType: true
      conditions:
        - attribute: event_type
          value: 'CouchbaseQueryEngineSample'

configuration:
  entityExpirationTime: DAILY
  alertable: true

dashboardTemplates:
  newRelic:
    template: newrelic_dashboard.json 

ownership:
  primaryOwner:
    teamName: "Database Integrations"
