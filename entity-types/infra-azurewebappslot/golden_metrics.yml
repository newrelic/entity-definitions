cpuTime:
  title: CPU Time (s)
  unit: SECONDS
  queries:
    azure:
      select: sum(azure.web.sites.slots.CpuTime)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
memoryWorkingSet:
  title: Memory Working Set
  unit: BYTES
  queries:
    azure:
      select: average(azure.web.sites.slots.AverageMemoryWorkingSet)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
dataIn:
  title: Data In
  unit: BYTES
  queries:
    azure:
      select: sum(azure.web.sites.slots.BytesReceived)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
dataOut:
  title: Data Out
  unit: BYTES
  queries:
    azure:
      select: sum(azure.web.sites.slots.BytesSent)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
connections:
  title: Connections
  unit: COUNT
  queries:
    azure:
      select: average(azure.web.sites.slots.AppConnections)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
