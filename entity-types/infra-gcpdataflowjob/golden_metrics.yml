systemLag:
  title: System lag
  unit: SECONDS
  queries:
    gcp:
      select: max(`gcp.dataflow.job.system_lag`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
elementCount:
  title: Elements processed
  unit: COUNT
  queries:
    gcp:
      select: sum(`gcp.dataflow.job.element_count`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
totalVcpuTime:
  title: Total vCPU time
  unit: SECONDS
  queries:
    gcp:
      select: sum(`gcp.dataflow.job.total_vcpu_time`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
