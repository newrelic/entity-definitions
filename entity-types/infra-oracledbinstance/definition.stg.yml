domain: INFRA
type: ORACLEDBINSTANCE
synthesis:
  rules:
    - ruleName: infra_oracle_db_instance_entityId
      identifier: entityId
      name: entityKey
      legacyFeatures:
        useNonStandardAttributes: true
        overrideGuidType: true
      prefixedTags:
        label.:
          ttl: PT4H
      conditions:
        - attribute: eventType
          value: 'OracleDatabaseSample'
      tags:
        integrationName:
          ttl: P1D
        integrationVersion:
          ttl: P1D
        reportingAgent:
          ttl: P1D
        reportingEndpoint:
          ttl: P1D

    - ruleName: infra_oracledbinstance_host_name
      identifier: host.name
      name: host.name
      encodeIdentifierInGUID: true
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: oracledb.
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/oracledbreceiver
      tags:
        otel.library.name:
          entityTagName: instrumentation.name
        otel.library.version:
          entityTagName: instrumentation.version
        host.address:
          entityTagNames: [host.address, endpoint]
        host.port:
          entityTagName: host.port

    - ruleName: infra_oracledbinstance_query_sample
      identifier: host.name
      name: host.name
      encodeIdentifierInGUID: true
      conditions:
        - attribute: eventType
          value: Log
        - attribute: event.name
          value: db.server.
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/oracledbreceiver
      tags:
        otel.library.name:
          entityTagName: instrumentation.name
        otel.library.version:
          entityTagName: instrumentation.version
        host.address:
          entityTagNames: [host.address, endpoint]
        host.port:
          entityTagName: host.port

  #new rules
    - ruleName: infra_oracledbinstance_execution_plan_nrdot
      compositeIdentifier:
        separator: ":"
        attributes:
          - host.address
          - host.port
      compositeName:
        fragments:
          - attribute: host.address
          - value: ":"
          - attribute: host.port
      encodeIdentifierInGUID: true
      conditions:
        - attribute: newrelic.event.type
          value: OracleExecutionPlan
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/newrelic/nrdot-collector-components/receiver/oracledbreceiver
      tags:
        otel.library.name:
          entityTagName: instrumentation.name
        otel.library.version:
          entityTagName: instrumentation.version
        db.version.full:
          entityTagName: database.version
        db.role:
          entityTagName: database.role
        host.address:
          entityTagNames: [host.address, endpoint]
        host.port:
          entityTagName: host.port

    - ruleName: infra_oracledbinstance_query_details_nrdot
      compositeIdentifier:
        separator: ":"
        attributes:
          - host.address
          - host.port
      compositeName:
        fragments:
          - attribute: host.address
          - value: ":"
          - attribute: host.port
      encodeIdentifierInGUID: true
      conditions:
        - attribute: newrelic.event.type
          value: OracleQueryDetails
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/newrelic/nrdot-collector-components/receiver/oracledbreceiver
      tags:
        otel.library.name:
          entityTagName: instrumentation.name
        otel.library.version:
          entityTagName: instrumentation.version
        db.version.full:
          entityTagName: database.version
        db.role:
          entityTagName: database.role
        host.address:
          entityTagNames: [host.address, endpoint]
        host.port:
          entityTagName: host.port

    - ruleName: infra_oracledbinstance_host_name_nrdot
      compositeIdentifier:
        separator: ":"
        attributes:
          - host.address
          - host.port
      compositeName:
        fragments:
          - attribute: host.address
          - value: ":"
          - attribute: host.port
      encodeIdentifierInGUID: true
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: oracledb.
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/newrelic/nrdot-collector-components/receiver/oracledbreceiver
      tags:
        otel.library.name:
          entityTagName: instrumentation.name
        otel.library.version:
          entityTagName: instrumentation.version
        db.version.full:
          entityTagName: database.version
        db.role:
          entityTagName: database.role
        host.address:
          entityTagNames: [host.address, endpoint]
        host.port:
          entityTagName: host.port
        
        
goldenTags: []
configuration:
  entityExpirationTime: DAILY
  alertable: true

dashboardTemplates:
  # This should match the entity created from the ohi in the infra pipeline
  newRelic:
    template: newrelic_dashboard.json
  opentelemetry:
    template: opentelemetry_dashboard.stg.json

ownership:
  primaryOwner:
    teamName: "Database Integrations"