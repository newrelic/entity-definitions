executionCount:
  title: Execution count
  unit: COUNT
  queries:
    opentelemetry:
      select: latest(oracledb.executions)
      from: Metric
      where: metricName = 'oracledb.executions'
sessionCount:
  title: Session count
  unit: COUNT
  queries:
    opentelemetry:
      select: latest(oracledb.sessions.usage)
      from: Metric
      where: metricName = 'oracledb.sessions.usage'
