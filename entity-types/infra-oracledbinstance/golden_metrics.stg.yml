parseCalls:
  title: Parse calls
  unit: COUNT
  queries:
    opentelemetry:
      select: sum(oracledb.connection.parse_count_total or oracledb.parse_calls)
      from: Metric
      where: metricName IN ('oracledb.connection.parse_count_total', 'oracledb.parse_calls')