executionCount:
  title: Execution count
  unit: COUNT
  queries:
    opentelemetry:
      select: sum(oracledb.connection.execute_count or oracledb.executions)
      from: Metric
      where: metricName IN ('oracledb.connection.execute_count', 'oracledb.executions')
sessionCount:
  title: Session count
  unit: COUNT
  queries:
    opentelemetry:
      select: sum(oracledb.sessions.count or oracledb.sessions.usage)
      from: Metric
      where: metricName IN ('oracledb.sessions.count', 'oracledb.sessions.usage')
hardParse:
  title: Hard parse
  unit: COUNT
  queries:
    opentelemetry:
      select: sum(oracledb.connection.parse_count_hard or oracledb.hard_parses)
      from: Metric
      where: metricName IN ('oracledb.connection.parse_count_hard', 'oracledb.hard_parses')
userCommits:
  title: User commits
  unit: COUNT
  queries:
    opentelemetry:
      select: sum(oracledb.connection.user_commits or oracledb.user_commits)
      from: Metric
      where: metricName IN ('oracledb.connection.user_commits', 'oracledb.user_commits')
userRollbacks:
  title: User rollbacks
  unit: COUNT
  queries:
    opentelemetry:
      select: sum(oracledb.connection.user_rollbacks or oracledb.user_rollbacks)
