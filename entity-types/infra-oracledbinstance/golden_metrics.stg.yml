executionCount:
  title: Execution count
  unit: COUNT
  queries:
    opentelemetry:
      select: latest(oracledb.connection.execute_count or oracledb.executions)
      from: Metric
      where: metricName IN ('oracledb.connection.execute_count', 'oracledb.executions')
sessionCount:
  title: Session count
  unit: COUNT
  queries:
    opentelemetry:
      select: latest(oracledb.sessions.count or oracledb.sessions.usage)
      from: Metric
      where: metricName IN ('oracledb.sessions.count', 'oracledb.sessions.usage')
enqueueDeadlocks:
  title: Deadlocks
  unit: COUNT
  queries:
    opentelemetry:
      select: latest(oracledb.system.enqueue_deadlocks_per_second or oracledb.enqueue_deadlocks)
      from: Metric
      where: metricName IN ('oracledb.system.enqueue_deadlocks_per_second','oracledb.enqueue_deadlocks')
userRollbacks:
  title: User rollbacks
  unit: COUNT
  queries:
    opentelemetry:
      select: latest(oracledb.connection.user_rollbacks or oracledb.user_rollbacks)
      from: Metric
      where: metricName IN ('oracledb.connection.user_rollbacks', 'oracledb.user_rollbacks')
dbBlocks:
  title: DB Block Gets
  unit: COUNT
  queries:
    opentelemetry:
      select: latest(oracledb.system.db_block_gets_per_second or oracledb.db_block_gets)
      from: Metric
      where: metricName IN ('oracledb.system.db_block_gets_per_second','oracledb.db_block_gets')      
logicalReads:
  title: Logical reads
  unit: COUNT
  queries:
    opentelemetry:
      select: latest(oracledb.system.logical_reads_per_second or oracledb.logical_reads)
      from: Metric
      where: metricName IN ('oracledb.system.logical_reads_per_second','oracledb.logical_reads')      
consistentReads:
  title: Consistent read requests from buffer cache
  unit: COUNT
  queries:
    opentelemetry:
      select: latest(oracledb.system.consistent_read_gets_per_second or oracledb.consistent_gets)
      from: Metric
      where: metricName IN ('oracledb.system.consistent_read_gets_per_second','oracledb.consistent_gets')