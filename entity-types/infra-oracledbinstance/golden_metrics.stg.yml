bufferCacheHitRatio:
  title: Buffer Cache Hit Ratio
  unit: PERCENTAGE
  queries:
    newRelic:
      select: average(memory.bufferCacheHitRatio)
      from: OracleDatabaseSample
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: average(oracledb.system.buffer_cache_hit_ratio)
      from: Metric
      where: metricName = 'oracledb.system.buffer_cache_hit_ratio'
databaseCpuTimeRatio:
  title: Database CPU Time Ratio
  unit: PERCENTAGE
  queries:
    opentelemetry:
      select: average(oracledb.system.database_cpu_time_ratio)
      from: Metric
      where: metricName = 'oracledb.system.database_cpu_time_ratio'
responseTimePerTransaction:
  title: Latency
  unit: MS
  queries:
    opentelemetry:
      select: average(oracledb.system.response_time_per_transaction)
