engineCpuUtilization:
  title: Engine CPU utilization (%)
  unit: PERCENTAGE
  queries:
    aws:
      select: average(aws.elasticache.EngineCPUUtilization)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
databaseMemoryUsagePercentage:
  title: Memory usage (%)
  unit: PERCENTAGE
  queries:
    aws:
      select: average(aws.elasticache.DatabaseMemoryUsageCountedForEvictPercentage)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
databaseCapacityUsagePercentage:
  title: Capacity usage (%)
  unit: PERCENTAGE
  queries:
    aws:
      select: average(aws.elasticache.DatabaseCapacityUsageCountedForEvictPercentage)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
