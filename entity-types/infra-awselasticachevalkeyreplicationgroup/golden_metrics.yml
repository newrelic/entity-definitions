engineCpuUtilization:
  title: Engine CPU utilization (%)
  unit: PERCENTAGE
  queries:
    aws:
      select: average(aws.elasticache.EngineCPUUtilization.byValkeyReplicationGroup)
      where: aws.elasticache.ReplicationGroupId is not null and aws.elasticache.NodeGroupId is null and aws.elasticache.Role is null
      from: Metric
      eventId: entity.guid
      eventName: entity.name
cpuUtilization:
  title: CPU utilization (%)
  unit: PERCENTAGE
  queries:
    aws:
      select: average(aws.elasticache.CPUUtilization.byValkeyReplicationGroup)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
freeableMemory:
  title: Free memory (bytes)
  unit: BYTES
  queries:
    aws:
      select: average(aws.elasticache.FreeableMemory.byValkeyReplicationGroup)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
networkBytesIn:
  title: Bytes in per sec
  unit: BYTES_PER_SECOND
  queries:
    aws:
      select: rate(sum(aws.elasticache.NetworkBytesIn.byValkeyReplicationGroup), 1 second)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
networkBytesOut:
  title: Bytes out per sec
  unit: BYTES_PER_SECOND
  queries:
    aws:
      select: rate(sum(aws.elasticache.NetworkBytesOut.byValkeyReplicationGroup), 1 second)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
replicationLag:
  title: Replication lag (seconds)
  unit: SECONDS
  queries:
    aws:
      select: average(aws.elasticache.ReplicationLag.byValkeyReplicationGroup)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
