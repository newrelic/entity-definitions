sendMessageRequests:
  queries:
    gcp:
      eventId: entity.guid
      eventName: entity.name
      select: sum(`gcp.pubsub.topic.send_request_count`)
      from: Metric
    gcpSample:
      eventId: entityGuid
      select: (rate(sum(`topic.SendMessageOperation`), 1 minute)) / 60
      from: GcpPubSubTopicSample
  unit: COUNT
  title: Publish requests
unackedMessages:
  queries:
    gcp:
      eventId: entity.guid
      eventName: entity.name
      select: average(`gcp.pubsub.topic.num_unacked_messages_by_region`)
      from: Metric
    gcpSample:
      eventId: entityGuid
      select: average(`topic.NumUnackedMessagesByRegion`)
      from: GcpPubSubTopicSample
  unit: COUNT
  title: Unacknowledged messages
retainedMessages:
  queries:
    gcp:
      eventId: entity.guid
      eventName: entity.name
      select: average(`gcp.pubsub.topic.num_retained_messages`)
      from: Metric
  unit: COUNT
  title: Retained messages
