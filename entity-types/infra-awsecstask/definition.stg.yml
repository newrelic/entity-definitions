domain: INFRA
type: AWSECSTASK
goldenTags:
  - aws.accountId
  - aws.region

synthesis:
  rules:
    # AWS ECS Task via OpenTelemetry ECS task metrics
    - ruleName: infra_awsecstask_otel_stg
      identifier: aws.ecs.task.arn
      name: aws.ecs.task.id
      encodeIdentifierInGUID: true
      legacyFeatures:
        overrideGuidType: true
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: newrelic.source
          value: api.metrics.otlp
        - attribute: cloud.platform
          value: aws_ecs
        - attribute: aws.ecs.task.arn
          present: true
        - attribute: aws.ecs.cluster.name
          present: true
        - attribute: metricName
          prefix: ecs.task.
      tags:
        # ECS Task attributes
        aws.ecs.task.arn:
          entityTagName: aws.taskArn
        aws.ecs.task.id:
          entityTagName: aws.taskId
        aws.ecs.task.family:
          entityTagName: aws.taskFamily
        aws.ecs.task.revision:
          entityTagName: aws.taskRevision
        aws.ecs.task.known_status:
          entityTagName: aws.taskStatus
        # ECS Service and Cluster context
        aws.ecs.service.name:
          entityTagName: aws.serviceName
        aws.ecs.cluster.name:
          entityTagName: aws.clusterName
        aws.arn:
          entityTagName: aws.clusterArn
        # Cloud attributes
        cloud.provider:
        cloud.platform:
        cloud.account.id:
          entityTagName: aws.accountId
        cloud.region:
          entityTagName: aws.awsRegion
        cloud.availability_zone:
          entityTagName: aws.availabilityZone
        # Launch type context
        aws.ecs.launchtype:
          entityTagName: aws.launchType
        aws.ecs.task.launch_type:
          entityTagName: aws.launchType
        # Instrumentation
        instrumentation.provider:

configuration:
  entityExpirationTime: DAILY
  alertable: false

ownership:
  primaryOwner:
    teamName: "Cloud Monitoring Platform"
  secondaryOwners:
    - teamName: "OnHost Agent and Integrations"
