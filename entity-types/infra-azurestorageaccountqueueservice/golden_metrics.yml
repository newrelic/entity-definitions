transactions:
  title: Transactions
  unit: COUNT
  queries:
    azure:
      select: sum(azure.storage.storageaccounts.queueservices.Transactions)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
availability:
  title: Availability
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.storage.storageaccounts.queueservices.Availability)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
queueMessageCount:
  title: Queue Message Count
  unit: COUNT
  queries:
    azure:
      select: average(azure.storage.storageaccounts.queueservices.QueueMessageCount)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
successE2ELatency:
  title: Success E2E Latency (ms)
  unit: MS
  queries:
    azure:
      select: average(azure.storage.storageaccounts.queueservices.SuccessE2ELatency)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
