cpuUtilization:
  title: CPU utilization
  unit: PERCENTAGE
  queries:
    gcp:
      select: max(`gcp.cloudsql.database.cpu.utilization`) * 100
      from: Metric
      eventId: entity.guid
      eventName: entity.name
memoryUtilization:
  title: Memory utilization
  unit: PERCENTAGE
