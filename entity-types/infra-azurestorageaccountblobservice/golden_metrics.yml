blobCapacity:
  title: Blob Capacity
  unit: BYTES
  queries:
    azure:
      select: average(azure.storage.storageaccounts.blobservices.BlobCapacity)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
transactions:
  title: Transactions
  unit: COUNT
  queries:
    azure:
      select: sum(azure.storage.storageaccounts.blobservices.Transactions)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
availability:
  title: Availability
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.storage.storageaccounts.blobservices.Availability)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
successE2ELatency:
  title: Success E2E Latency (ms)
  unit: MS
  queries:
    azure:
      select: average(azure.storage.storageaccounts.blobservices.SuccessE2ELatency)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
