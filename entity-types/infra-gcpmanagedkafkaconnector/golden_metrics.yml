connectorTasks:
  title: Connector Tasks
  unit: COUNT
  queries:
    gcp:
      select: average(gcp.managedkafka.connector_tasks)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

connectorTotalErrorRecordCount:
  title: Record Errors
  unit: COUNT
  queries:
    gcp:
      select: sum(gcp.managedkafka.connector_total_error_record_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

connectorSinkActiveRecords:
  title: Active Records (Sink)
  unit: COUNT
  queries:
    gcp:
      select: average(gcp.managedkafka.connector_sink_active_records)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
