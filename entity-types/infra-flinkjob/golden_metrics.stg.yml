checkpointCount:
  title: Checkpoints Completed
  unit: COUNT
  queries:
    opentelemetry:
      select: sum(flink.job.checkpoint.count)
      from: Metric
      where: checkpoint = 'completed' AND instrumentation.provider = 'opentelemetry'
      eventId: entity.guid
      eventName: entity.name

checkpointFailed:
  title: Checkpoints Failed
  unit: COUNT
  queries:
    opentelemetry:
      select: sum(flink.job.checkpoint.count)
      from: Metric
      where: checkpoint = 'failed' AND instrumentation.provider = 'opentelemetry'
      eventId: entity.guid
      eventName: entity.name

lastCheckpointTime:
  title: Last Checkpoint Duration
  unit: MS
  queries:
    opentelemetry:
      select: latest(flink.job.last_checkpoint.time)
      from: Metric
      where: instrumentation.provider = 'opentelemetry'
      eventId: entity.guid
      eventName: entity.name

restartCount:
