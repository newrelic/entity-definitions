newConnectionsCount:
  title: New Connections
  unit: COUNT
  queries:
    gcp:
      select: sum(gcp.loadbalancing.l4_proxy.tcp.new_connections_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

egressBytesCount:
  title: Egress Bytes
  unit: BYTES
  queries:
    gcp:
      select: sum(gcp.loadbalancing.l4_proxy.egress_bytes_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

closedConnectionsCount:
  title: Closed Connections
  unit: COUNT
  queries:
    gcp:
      select: sum(gcp.loadbalancing.l4_proxy.tcp.closed_connections_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
