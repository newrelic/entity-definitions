storageUsage:
  title: Storage Usage
  unit: BYTES
  queries:
    gcp:
      select: sum(`gcp.alloydb.cluster.storage.usage`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
backupLastBackupTime:
  title: Last Backup Time
  unit: TIMESTAMP
  queries:
    gcp:
      select: latest(`gcp.alloydb.cluster.backup.last_backup_time`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
