ioUtilization:
  title: I/O Utilization
  unit: PERCENTAGE
  queries:
    gcp:
      select: average(gcp.firebasedatabase.io.utilization) * 100
      from: Metric
      eventId: entity.guid
      eventName: entity.name

activeConnections:
  title: Active Connections
  unit: COUNT
  queries:
    gcp:
      select: average(gcp.firebasedatabase.network.active_connections)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

sentBytesCount:
  title: Sent Bytes
  unit: BYTES
  queries:
    gcp:
      select: sum(gcp.firebasedatabase.network.sent_bytes_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
