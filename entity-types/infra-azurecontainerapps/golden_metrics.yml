requests:
  title: Requests
  unit: COUNT
  queries:
    azure:
      select: sum(azure.app.containerapps.Requests)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
cpuUsage:
  title: CPU Usage
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.app.containerapps.CpuPercentage)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
memoryUsage:
  title: Memory Usage
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.app.containerapps.MemoryPercentage)
      from: Metric
      eventId: entity.guid
      eventName: entity.name