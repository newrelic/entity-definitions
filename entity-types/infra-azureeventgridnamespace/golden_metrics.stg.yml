successfulPublishedEvents:
  title: Successful published events
  unit: COUNT
  queries:
    azure:
      select: sum(azure.eventgrid.namespaces.SuccessfulPublishedEvents)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
failedPublishedEvents:
  title: Failed published events
  unit: COUNT
  queries:
    azure:
      select: sum(azure.eventgrid.namespaces.FailedPublishedEvents)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
successfulReceivedEvents:
  title: Successful received events
  unit: COUNT
  queries:
    azure:
      select: sum(azure.eventgrid.namespaces.SuccessfulReceivedEvents)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
publishLatencyInMilliseconds:
  title: Publish latency
  unit: MS
  queries:
    azure:
      select: average(azure.eventgrid.namespaces.PublishLatencyInMilliseconds)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
