connections:
  title: Connections
  unit: COUNT
  queries:
    newRelic:
      select: average(stats.connections)
      from: MssqlInstanceSample
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: latest(sqlserver.stats.connections or sqlserver.user.connection.count)
      from: Metric
      where: metricName IN ('sqlserver.stats.connections', 'sqlserver.user.connection.count')
bufferCacheHitRatio:
  title: Buffer Cache Hit Ratio
  unit: PERCENTAGE
  queries:
    newRelic:
      select: average(system.bufferPoolHitPercent)
      from: MssqlInstanceSample
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: average(sqlserver.instance.buffer_pool_hit_percent or sqlserver.page.buffer_cache.hit_ratio)
      from: Metric
      where: metricName IN ('sqlserver.instance.buffer_pool_hit_percent', 'sqlserver.page.buffer_cache.hit_ratio')
