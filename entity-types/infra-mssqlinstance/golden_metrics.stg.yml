connections:
  title: Connections
  unit: COUNT
  queries:
    newRelic:
      select: average(stats.connections)
      from: MssqlInstanceSample
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: average(sqlserver.stats.connections,'sqlserver.user.connection.count')
      from: Metric
      where: metricName IN ('sqlserver.stats.connections', 'sqlserver.user.connection.count')
sessionStatus:
  queries:
    newRelic:
      select: average(`stats.sqlCompilations`)
      from: MssqlInstanceSample
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: average(sqlserver.stats.sql_compilations_per_sec,'sqlserver.batch.sql_compilation.rate')
      from: Metric
      where: metricName IN ('sqlserver.stats.sql_compilations_per_sec', 'sqlserver.batch.sql_compilation.rate')
  unit: COUNT
  title: SQL (re-)compilations
bufferCacheHitRatio:
  title: Buffer Cache Hit Ratio
  unit: PERCENTAGE
  queries:
    newRelic:
      select: average(system.bufferPoolHitPercent)
      from: MssqlInstanceSample
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: average(sqlserver.instance.buffer_pool_hit_percent,'sqlserver.page.buffer_cache.hit_ratio')
      from: Metric
      where: metricName IN ('sqlserver.instance.buffer_pool_hit_percent', 'sqlserver.page.buffer_cache.hit_ratio')
