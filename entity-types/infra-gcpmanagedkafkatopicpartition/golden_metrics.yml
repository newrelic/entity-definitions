consumerLag:
  title: Consumer Lag
  unit: COUNT
  queries:
    gcp:
      select: average(gcp.managedkafka.consumer_lag)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

byteSize:
  title: Partition Size (bytes)
  unit: BYTES
  queries:
    gcp:
      select: average(gcp.managedkafka.byte_size)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

lastOffset:
  title: Last Offset
  unit: COUNT
  queries:
    gcp:
      select: average(gcp.managedkafka.last_offset)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
