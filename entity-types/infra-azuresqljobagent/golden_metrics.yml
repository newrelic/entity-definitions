elasticJobsFailed:
  title: Elastic Jobs Failed
  unit: COUNT
  queries:
    azure:
      select: sum(azure.sql.servers.jobagents.elastic_jobs_failed)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
elasticJobsSuccessful:
  title: Elastic Jobs Successful
  unit: COUNT
  queries:
    azure:
      select: sum(azure.sql.servers.jobagents.elastic_jobs_successful)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
elasticJobsTimeout:
  title: Elastic Jobs Timed Out
  unit: COUNT
  queries:
    azure:
      select: sum(azure.sql.servers.jobagents.elastic_jobs_timeout)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
