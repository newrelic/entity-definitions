p2sConnectionCount:
  title: P2S Connection Count
  unit: COUNT
  queries:
    azure:
      select: sum(azure.network.p2svpngateways.P2SConnectionCount)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
p2sBandwidth:
  title: Gateway P2S Bandwidth
  unit: BYTES_PER_SECOND
  queries:
    azure:
      select: average(azure.network.p2svpngateways.P2SBandwidth)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
userVpnRouteCount:
  title: User VPN Route Count
  unit: COUNT
  queries:
    azure:
      select: sum(azure.network.p2svpngateways.UserVpnRouteCount)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
