dwuUsedPercent:
  title: DWU used (%)
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.synapse.workspaces.sqlpools.DWUUsedPercent)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
cpuPercent:
  title: CPU (%)
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.synapse.workspaces.sqlpools.CPUPercent)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
memoryUsedPercent:
  title: Memory used (%)
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.synapse.workspaces.sqlpools.MemoryUsedPercent)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
activeQueries:
  title: Active queries
  unit: COUNT
  queries:
    azure:
      select: sum(azure.synapse.workspaces.sqlpools.ActiveQueries)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
