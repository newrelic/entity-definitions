cpuUtilization:
  title: CPU Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(`oci.oracledb.cpu.utilization`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
storageUtilization:
  title: Storage Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(`oci.oracledb.storage.utilization`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
sessions:
  title: Active Sessions
  unit: COUNT
  queries:
    oci:
      select: average(`oci.oracledb.sessions`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
transactionsPerSec:
  title: Transactions per Second
  unit: COUNT
  queries:
    oci:
      select: rate(sum(`oci.oracledb.transactions.per.sec`), 1 second)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
dbTime:
  title: Database Time
  unit: MS
  queries:
    oci:
      select: average(`oci.oracledb.db.time`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
databaseAvailability:
  title: Database Availability
  unit: COUNT
  queries:
    oci:
      select: latest(`oci.oracledb.database.availability`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
