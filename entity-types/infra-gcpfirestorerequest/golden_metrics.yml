requestCount:
  title: Request Count
  unit: COUNT
  queries:
    gcp:
      select: sum(gcp.firestore.api.request_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

errorCount:
  title: Error Request Count
  unit: COUNT
  queries:
    gcp:
      select: sum(gcp.firestore.api.request_count)
      from: Metric
      where: "`metric.response_code` NOT IN ('OK')"
      eventId: entity.guid
      eventName: entity.name
