domain: INFRA
type: RABBITMQEXCHANGE
goldenTags:
- account
configuration:
  entityExpirationTime: DAILY
  alertable: true

synthesis:
  rules:
    # Data from RabbitMQ integation OHI
    - ruleName: infra_rabbitmqexchange_entityId
      identifier: entityId
      name: entityKey
      legacyFeatures:
        useNonStandardAttributes: true
        overrideGuidType: true
      conditions:
        - attribute: eventType
          value: RabbitmqExchangeSample
      prefixedTags:
        label.:
          ttl: PT4H
      tags:
        integrationName:
          ttl: P1D
        integrationVersion:
          ttl: P1D
        reportingAgent:
          ttl: P1D
        reportingEndpoint:
          ttl: P1D

dashboardTemplates:
  # This should match the entity created from the ohi in the infra pipeline
  newRelic:
    template: newrelic_dashboard.json

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
