cpuCoreUsageTime:
  title: CPU Core Usage
  unit: PERCENTAGE
  queries:
    gcp:
      select: rate(sum(gcp.managedkafka.cpu.core_usage_time), 1 minute)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

offlinePartitions:
  title: Offline Partitions
  unit: COUNT
  queries:
    gcp:
      select: average(gcp.managedkafka.offline_partitions)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

requestLatencies:
  title: Request Latency p99 (ms)
  unit: MS
  queries:
    gcp:
      select: average(gcp.managedkafka.request_latencies)
      from: Metric
      where: "metric.percentile = '99'"
      eventId: entity.guid
      eventName: entity.name
