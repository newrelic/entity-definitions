# Synthesis rule test: ext_redpandabroker_otel_metrics
# Tests that a RedPanda broker entity is correctly synthesized from OTel metrics

- description: RedPanda broker entity created from OTel Prometheus scrape
  input:
    eventType: Metric
    instrumentation.provider: opentelemetry
    metricName: redpanda_cluster_brokers
    server.address: redpanda-broker-0.example.com:9644
    redpanda.cluster.name: production-cluster
  expected:
    entityType: EXT-REDPANDABROKER
    identifier: "redpanda-broker-0.example.com:9644:production-cluster"
    name: "redpanda-broker-0.example.com:9644 (production-cluster)"

- description: RedPanda broker entity NOT created when missing redpanda.cluster.name
  input:
    eventType: Metric
    instrumentation.provider: opentelemetry
    metricName: redpanda_cluster_brokers
    server.address: redpanda-broker-0.example.com:9644
  expected:
    entityType: null

- description: RedPanda broker entity NOT created when missing server.address
  input:
    eventType: Metric
    instrumentation.provider: opentelemetry
    metricName: redpanda_cluster_brokers
    redpanda.cluster.name: production-cluster
  expected:
    entityType: null

- description: RedPanda broker entity NOT created for non-OTel provider
  input:
    eventType: Metric
    instrumentation.provider: prometheus
    metricName: redpanda_cluster_brokers
    server.address: redpanda-broker-0.example.com:9644
    redpanda.cluster.name: production-cluster
  expected:
    entityType: null
