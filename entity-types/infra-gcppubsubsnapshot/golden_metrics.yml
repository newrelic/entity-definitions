backlogBytes:
  title: Backlog bytes
  unit: BYTES
  queries:
    gcp:
      select: sum(`gcp.pubsub.snapshot.backlog_bytes`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
numMessages:
  title: Number of messages
  unit: COUNT
  queries:
    gcp:
      select: sum(`gcp.pubsub.snapshot.num_messages`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
oldestMessageAge:
  title: Oldest message age
  unit: SECONDS
  queries:
    gcp:
      select: latest(`gcp.pubsub.snapshot.oldest_message_age`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
