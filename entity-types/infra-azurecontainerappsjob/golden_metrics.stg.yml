jobExecutions:
  title: Job Executions
  unit: COUNT
  queries:
    azure:
      select: sum(azure.app.jobs.Executions)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
cpuUsage:
  title: CPU Usage
  unit: COUNT
  queries:
    azure:
      select: average(azure.app.jobs.UsageNanoCores)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
memoryUsage:
  title: Memory Usage
  unit: BYTES
  queries:
    azure:
      select: average(azure.app.jobs.UsageBytes)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
