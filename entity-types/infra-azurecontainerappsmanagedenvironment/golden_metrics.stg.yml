cpuUsage:
  title: Ingress CPU Usage
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.app.managedenvironments.IngressCpuPercentage)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
memoryUsage:
  title: Ingress Memory Usage
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.app.managedenvironments.IngressMemoryPercentage)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
nodeCount:
  title: Node Count
  unit: COUNT
  queries:
    azure:
      select: average(azure.app.managedenvironments.NodeCount)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
