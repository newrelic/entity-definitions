numberOfRequests:
  title: Requests
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.waf.number.of.requests`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
traffic:
  title: Traffic
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: sum(`oci.waf.traffic`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
bandwidth:
  title: Bandwidth
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.waf.bandwidth`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
numberOfRequestsDetected:
  title: Detects
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.waf.number.of.requests.detected`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
