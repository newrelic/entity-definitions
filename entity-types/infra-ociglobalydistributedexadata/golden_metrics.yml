shardCount:
  title: Shard Count
  unit: COUNT
  queries:
    oci:
      select: latest(`oci.globdistexadata.shard.count`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
exadataCellHealth:
  title: Exadata Cell Health
  unit: COUNT
  queries:
    oci:
      select: latest(`oci.globdistexadata.exadata.cell.health`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
ioLatency:
  title: I/O Latency
  unit: MS
  queries:
    oci:
      select: average(`oci.globdistexadata.io.latency`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
storageUtilization:
  title: Storage Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(`oci.globdistexadata.storage.utilization`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
shardReplicationLag:
  title: Shard Replication Lag
  unit: SECONDS
  queries:
    oci:
      select: average(`oci.globdistexadata.shard.replication.lag`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
