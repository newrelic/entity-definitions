domain: EXT
type: DATABRICKS_CLUSTER

synthesis:
  rules:
  - ruleName: ext_databricks_cluster_databricksClusterId
    identifier: databricksClusterId
    name: databricksClusterName
    encodeIdentifierInGUID: true
    conditions:
    - attribute: instrumentation.name
      value: "New Relic Databricks Integration"
    - attribute: instrumentation.provider
      value: "newrelic-labs"
    - attribute: collector.name
      value: "com.newrelic.labs.newrelic-databricks-integration"
    - attribute: sparkAppId
      present: true
    tags:
      databricksWorkspaceId:
        multiValue: false
      databricksWorkspaceName:
        multiValue: false
      databricksWorkspaceUrl:
        multiValue: false
      databricksClusterId:
        multiValue: false
      databricksClusterName:
        multiValue: false
      databricksClusterSource:
        multiValue: false
      databricksClusterInstancePoolId:
        multiValue: false

dashboardTemplates:
  newRelic:
    template: dashboard.json

configuration:
  alertable: true

ownership:
  primaryOwner:
    teamName: "no owner"
