readThroughput:
  title: Read Throughput
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.filestorage.file.system.read.throughput`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

writeThroughput:
  title: Write Throughput
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.filestorage.file.system.write.throughput`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

metadataIops:
  title: Metadata IOPS
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.filestorage.metadata.iops`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

usage:
  title: Usage
  unit: BYTES
  queries:
    oci:
      select: latest(`oci.filestorage.file.system.usage`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

hardQuotaViolations:
  title: Hard Quota Violations
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.filestorage.user.hard.quota.violations`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
