environmentHealthy:
  title: Environment healthy
  unit: COUNT
  queries:
    gcp:
      select: latest(gcp.composer.environment.healthy)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: latest(environment.HealthStatus)
      from: GcpComposerEnvironmentSample
      eventId: entityGuid
      eventName: entityName
