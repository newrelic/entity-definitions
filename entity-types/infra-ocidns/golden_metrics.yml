dnsQueryCount:
  title: DNS Query Count
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.dns.dns.query.count`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

trafficManagementQueryCount:
  title: Traffic Management Query Count
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.dns.traffic.management.query.count`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

