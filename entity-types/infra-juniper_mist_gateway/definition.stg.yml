
domain: INFRA
type: JUNIPER_MIST_GATEWAY
synthesis:
  rules:
  - ruleName: infra_juniper_mist_gateway_mac
    name: mist.name
    compositeIdentifier:
      separator: ":"
      attributes:
        - vendor
        - mist.org_id
        - mist.mac
    encodeIdentifierInGUID: true
    conditions:
    - attribute: instrumentation.name
      value: juniper_mist
    - attribute: mist.device_type
      value: gateway
    tags:
      mist.ip:
        entityTagName: mist.ip
        multiValue: false
      mist.mac:
        entityTagName: mist.mac
        multiValue: false
      mist.model:
        entityTagName: mist.model
        multiValue: false
      mist.org_id:
        entityTagName: mist.org_id
        multiValue: false
      mist.org_name:
        entityTagName: mist.org_name
        multiValue: false
      mist.site_id:
        entityTagName: mist.site_id
        multiValue: false
      mist.site_name:
        entityTagName: mist.site_name
        multiValue: false
      vendor:
        entityTagName: vendor
        multiValue: false
      mist.region:
        entityTagName: mist.region
        multiValue: false
      mist.serial:
        entityTagName: mist.serial
        multiValue: false
      mist.device_id:
        entityTagName: mist.device_id
        multiValue: false
      mist.device_type:
        entityTagName: mist.device_type
        multiValue: false
      mist.device_status:
        entityTagName: mist.device_status
        multiValue: false
      mist.node_name:
        entityTagName: mist.node_name
        multiValue: false

    # Add a 4 hour ttl on all tags ingested in metric api using tags. prefix
    prefixedTags:
      tags.:
        ttl: PT4H



ownership:
  primaryOwner:
    teamName: "Network Monitoring"