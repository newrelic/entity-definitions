bytesReceived:
  title: Bytes Received
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.fastconnect.bytes.received`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
bytesSent:
  title: Bytes Sent
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.fastconnect.bytes.sent`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
packetsReceived:
  title: Packets Received
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.fastconnect.packets.received`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
packetsSent:
  title: Packets Sent
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.fastconnect.packets.sent`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
connectionState:
  title: Connection State
  unit: COUNT
  queries:
    oci:
      select: latest(`oci.fastconnect.connection.state`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
ipv4BgpSessionState:
  title: IPv4 BGP Session State
  unit: COUNT
  queries:
    oci:
      select: latest(`oci.fastconnect.ipv4.bgp.session.state`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
