cacheHitRate:
  title: Cache hit rate (%)
  unit: PERCENTAGE
  queries:
    aws:
      select: average(aws.elasticache.CacheHitRate)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
cacheHits:
  title: Cache hits
  unit: COUNT
  queries:
    aws:
      select: sum(aws.elasticache.CacheHits)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
cacheMisses:
  title: Cache misses
  unit: COUNT
  queries:
    aws:
      select: sum(aws.elasticache.CacheMisses)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
bytesUsedForCache:
  title: Cache storage used (bytes)
  unit: BYTES
  queries:
    aws:
      select: average(aws.elasticache.BytesUsedForCache)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
evictions:
  title: Evictions per second
  unit: REQUESTS_PER_SECOND
  queries:
    aws:
      select: rate(sum(aws.elasticache.Evictions), 1 second)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
throttledCmds:
  title: Throttled commands
  unit: COUNT
  queries:
    aws:
      select: sum(aws.elasticache.ThrottledCmds)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
currItems:
  title: Current items in cache
  unit: COUNT
  queries:
    aws:
      select: average(aws.elasticache.CurrItems)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
