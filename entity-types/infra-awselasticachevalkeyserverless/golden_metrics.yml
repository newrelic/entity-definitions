ecpuUtilization:
  title: ECPU utilization
  unit: COUNT
  queries:
    aws:
      select: sum(aws.elasticache.ElastiCacheProcessingUnits.byValkeyServerless)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
bytesUsedForCache:
  title: Cache storage used (bytes)
  unit: BYTES
  queries:
    aws:
      select: average(aws.elasticache.BytesUsedForCache.byValkeyServerless)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
cacheHitRate:
  title: Cache hit rate (%)
  unit: PERCENTAGE
  queries:
    aws:
      select: sum(aws.elasticache.CacheHits.byValkeyServerless) / (sum(aws.elasticache.CacheHits.byValkeyServerless) + sum(aws.elasticache.CacheMisses.byValkeyServerless)) * 100
      from: Metric
      eventId: entity.guid
      eventName: entity.name
successfulReadRequestLatency:
  title: Read latency (microseconds)
  unit: MS
  queries:
    aws:
      select: average(aws.elasticache.SuccessfulReadRequestLatency.byValkeyServerless)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
successfulWriteRequestLatency:
  title: Write latency (microseconds)
  unit: MS
  queries:
    aws:
      select: average(aws.elasticache.SuccessfulWriteRequestLatency.byValkeyServerless)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
networkBytesIn:
  title: Bytes in per sec
  unit: BYTES_PER_SECOND
  queries:
    aws:
      select: rate(sum(aws.elasticache.NetworkBytesIn.byValkeyServerless), 1 second)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
networkBytesOut:
  title: Bytes out per sec
  unit: BYTES_PER_SECOND
  queries:
    aws:
      select: rate(sum(aws.elasticache.NetworkBytesOut.byValkeyServerless), 1 second)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
