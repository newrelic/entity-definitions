# Summary metrics for INFRA-REDISINSTANCE entity type
# Displayed in Entity Explorer list view for OHAI OTel Redis integration
connectedClients:
  goldenMetric: connectedClients
  unit: COUNT
  title: Connected clients
memoryUsed:
  goldenMetric: memoryUsed
  unit: BYTES
  title: Memory used
commandsPerSecond:
  goldenMetric: commandsPerSecond
  unit: OPERATIONS_PER_SECOND
  title: Commands/sec
keyspaceHitRate:
  goldenMetric: keyspaceHitRate
  unit: PERCENTAGE
  title: Hit rate
connectionsRejected:
  goldenMetric: connectionsRejected
  unit: COUNT
  title: Connections rejected
