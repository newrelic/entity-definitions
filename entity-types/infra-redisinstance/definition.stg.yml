domain: INFRA
type: REDISINSTANCE

synthesis:
  # Apart from this rule REDISINSTANCE entities are also created from infra pipeline.
  rules:
  - ruleName: infra_redisinstance_composite
    compositeIdentifier:
      separator: ":"
      attributes:
        - server.address
        - server.port
    name: server.address
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      # All metrics from the receiver starts with the 'redis.' prefix.
      - attribute: metricName
        prefix: redis.
      - attribute: instrumentation.provider
        value: opentelemetry
      # This filters only metrics coming from redis receiver, given that metrics
      # could deffer between different runtime receivers. 
      - attribute: otel.library.name
        value: otelcol/redisreceiver
    tags:
      # Default resource attributes
      redis.version:
      # Attributes
      redis.role:
      # Environment resource attributes
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      # OTel attributes
      # The library name contains the name of the receiver that is used to identify the source
      # and select the dashboard.
      otel.library.name:
        entityTagName: instrumentation.name
      server.address:
      server.port:
  # OpenTelemetry synthesis rule - service.instance.id pattern
  - ruleName: infra_redisinstance_otel
    identifier: service.instance.id
    name: service.instance.id
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      # Support both redis. and redis_ prefix metrics
      - attribute: metricName
        anyOf:
          - prefix: redis.
          - prefix: redis_
      - attribute: instrumentation.provider
        value: opentelemetry
      # Only trigger when service.instance.id pattern is used (not server.address pattern)
      - attribute: service.instance.id
        present: true
      - attribute: server.address
        present: false
      # Entity creation triggered by redis.role OR service.name containing redis
      - anyOf:
          - attribute: redis.role
            present: true
          - attribute: service.name
            contains: redis
    tags:
      # Required resource attributes
      service.name:
      service.instance.id:
      redis.version:
      redis.role:
      redis.port:
      host.name:
      host.id:
      # Optional resource attributes
      redis.cluster.name:
      redis.cluster.enabled:
      redis.maxmemory:
      redis.persistence.enabled:
      # Environment resource attributes
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      # Kubernetes attributes (optional)
      k8s.namespace.name:
      k8s.pod.name:
      # OTel attributes
      otel.library.name:
        entityTagName: instrumentation.name

  tags:
    # For OpenTelemetry
    telemetry.sdk.name:
      entityTagName: instrumentation.provider
    # AWS tags
    aws.region:

dashboardTemplates:
  # This should match the entity created from nri-redis in the infra pipeline
  newRelic:
    template: newrelic_dashboard.json
  # Redis receiver
  opentelemetry:
    template: opentelemetry_dashboard.json

goldenTags:
# Redis OHI
- redis.port
- redis.hostname
- redis.version
- redis.clusterRole
# OpenTelemetry - server.address pattern
- server.address
- server.port
# OpenTelemetry - service.instance.id pattern
- service.name
- service.instance.id
- host.name
- host.id
- redis.cluster.name

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"