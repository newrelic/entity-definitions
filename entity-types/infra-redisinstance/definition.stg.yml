domain: INFRA
type: REDISINSTANCE

synthesis:
  # Apart from this rule REDISINSTANCE entities are also created from infra pipeline.
  rules:
  # Custom identifier rules (higher priority)
  # If the user explicitly sets redis.instance.id, these rules take precedence
  # regardless of whether server.address is also present.

  # redis.instance.id pattern - contrib receiver (full module path)
  - ruleName: infra_redisinstance_otel
    identifier: redis.instance.id
    name: redis.instance.id
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      - attribute: metricName
        prefix: redis.
      - attribute: instrumentation.provider
        value: opentelemetry
      # Triggers when redis.instance.id is explicitly set by the user
      - attribute: redis.instance.id
        present: true
      - attribute: otel.library.name
        value: "github.com/open-telemetry/opentelemetry-collector-contrib/receiver/redisreceiver"
    tags:
      # Required resource attributes
      redis.instance.id:
      redis.version:
      redis.role:
      redis.port:
      host.name:
        ttl: P1D
      host.id:
        ttl: P1D
      # Optional resource attributes
      redis.cluster.name:
      redis.cluster.enabled:
      redis.maxmemory:
      redis.persistence.enabled:
      # Environment resource attributes
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      # Kubernetes attributes (optional)
      k8s.namespace.name:
        ttl: P1D
      k8s.pod.name:
        ttl: P1D
      # OTel attributes
      otel.library.name:
        entityTagName: instrumentation.name
      # Keep server.address as a tag for filtering
      server.address:
      server.port:

  # redis.instance.id pattern - standard legacy receiver.
  - ruleName: infra_redisinstance_otel_1
    identifier: redis.instance.id
    name: redis.instance.id
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      - attribute: metricName
        prefix: redis.
      - attribute: instrumentation.provider
        value: opentelemetry
      # Triggers when redis.instance.id is explicitly set by the user
      - attribute: redis.instance.id
        present: true
      - attribute: otel.library.name
        value: otelcol/redisreceiver
    tags:
      # Required resource attributes
      redis.instance.id:
      redis.version:
      redis.role:
      redis.port:
      host.name:
        ttl: P1D
      host.id:
        ttl: P1D
      # Optional resource attributes
      redis.cluster.name:
      redis.cluster.enabled:
      redis.maxmemory:
      redis.persistence.enabled:
      # Environment resource attributes
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      # Kubernetes attributes (optional)
      k8s.namespace.name:
        ttl: P1D
      k8s.pod.name:
        ttl: P1D
      # OTel attributes
      otel.library.name:
        entityTagName: instrumentation.name
      # Keep server.address as a tag for filtering
      server.address:
      server.port:

  # Prometheus receiver rules (redis_exporter + prometheus receiver)
  #
  # NOTE: server.address and server.port are not available in the redis_exporter
  # metrics, so the composite pattern is not possible. Only redis.instance.id
  # pattern is supported for the Prometheus receiver approach.
  #
  # NRDOT variant:
  - ruleName: infra_redisinstance_otel_prometheus
    identifier: redis.instance.id
    name: redis.instance.id
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      - attribute: metricName
        prefix: redis.
      - attribute: instrumentation.provider
        value: opentelemetry
      # Triggers when redis.instance.id is explicitly set by the user
      - attribute: redis.instance.id
        present: true
      - attribute: otel.library.name
        value: otelcol/prometheusreceiver
    tags:
      # Required resource attributes
      redis.instance.id:
      host.name:
        ttl: P1D
      host.id:
        ttl: P1D
      # Optional resource attributes
      redis.cluster.name:
      # Environment resource attributes
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      # Kubernetes attributes (optional)
      k8s.namespace.name:
        ttl: P1D
      k8s.pod.name:
        ttl: P1D
      # OTel attributes
      otel.library.name:
        entityTagName: instrumentation.name

  # Contrib variant (full module path):
  - ruleName: infra_redisinstance_otel_prometheus_1
    identifier: redis.instance.id
    name: redis.instance.id
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      - attribute: metricName
        prefix: redis.
      - attribute: instrumentation.provider
        value: opentelemetry
      # Triggers when redis.instance.id is explicitly set by the user
      - attribute: redis.instance.id
        present: true
      - attribute: otel.library.name
        value: "github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver"
    tags:
      # Required resource attributes
      redis.instance.id:
      host.name:
        ttl: P1D
      host.id:
        ttl: P1D
      # Optional resource attributes
      redis.cluster.name:
      # Environment resource attributes
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      # Kubernetes attributes (optional)
      k8s.namespace.name:
        ttl: P1D
      k8s.pod.name:
        ttl: P1D
      # OTel attributes
      otel.library.name:
        entityTagName: instrumentation.name

  # Composite identifier rules (fallback)
  # Only trigger when no custom redis.instance.id is set.

  # server.address:server.port pattern - standard legacy receiver.
  - ruleName: infra_redisinstance_composite
    compositeIdentifier:
      separator: ":"
      attributes:
        - server.address
        - server.port
    compositeName:
      fragments:
        - attribute: server.address
        - value: ":"
        - attribute: server.port
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      # All metrics from the receiver starts with the 'redis.' prefix.
      - attribute: metricName
        prefix: redis.
      - attribute: instrumentation.provider
        value: opentelemetry
      # This filters only metrics coming from redis receiver, given that metrics
      # could deffer between different runtime receivers.
      - attribute: otel.library.name
        value: otelcol/redisreceiver
      # Only use composite when no custom identifier is provided
      - attribute: redis.instance.id
        present: false
    tags:
      # Default resource attributes
      redis.version:
      # Attributes
      redis.role:
      redis.port:
      # Host attributes
      host.name:
        ttl: P1D
      host.id:
        ttl: P1D
      # Optional resource attributes
      redis.cluster.name:
      redis.cluster.enabled:
      redis.maxmemory:
      redis.persistence.enabled:
      # Environment resource attributes
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      # Kubernetes attributes (optional)
      k8s.namespace.name:
        ttl: P1D
      k8s.pod.name:
        ttl: P1D
      # OTel attributes
      # The library name contains the name of the receiver that is used to identify the source
      # and select the dashboard.
      otel.library.name:
        entityTagName: instrumentation.name
      server.address:
      server.port:

  # server.address:server.port pattern - contrib receiver (full module path)
  - ruleName: infra_redisinstance_composite_1
    compositeIdentifier:
      separator: ":"
      attributes:
        - server.address
        - server.port
    compositeName:
      fragments:
        - attribute: server.address
        - value: ":"
        - attribute: server.port
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      - attribute: metricName
        prefix: redis.
      - attribute: instrumentation.provider
        value: opentelemetry
      - attribute: otel.library.name
        value: "github.com/open-telemetry/opentelemetry-collector-contrib/receiver/redisreceiver"
      # Only use composite when no custom identifier is provided
      - attribute: redis.instance.id
        present: false
    tags:
      # Default resource attributes
      redis.version:
      # Attributes
      redis.role:
      redis.port:
      # Host attributes
      host.name:
        ttl: P1D
      host.id:
        ttl: P1D
      # Optional resource attributes
      redis.cluster.name:
      redis.cluster.enabled:
      redis.maxmemory:
      redis.persistence.enabled:
      # Environment resource attributes
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      # Kubernetes attributes (optional)
      k8s.namespace.name:
        ttl: P1D
      k8s.pod.name:
        ttl: P1D
      # OTel attributes
      otel.library.name:
        entityTagName: instrumentation.name
      server.address:
      server.port:

  # Log synthesis rules

  # Log rule - redis.instance.id pattern (higher priority)
  - ruleName: infra_redisinstance_otel_logs_instance_id
    identifier: redis.instance.id
    name: redis.instance.id
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Log
      - attribute: instrumentation.provider
        value: opentelemetry
      - attribute: newrelic.source
        value: "api.logs.otlp"
      - attribute: db.system
        value: "redis"
      - attribute: redis.instance.id
        present: true
    tags:
      redis.instance.id:
      redis.role:
      host.name:
        ttl: P1D
      host.id:
        ttl: P1D
      cloud.provider:
      cloud.region:
      server.address:
      server.port:

  # Log rule - server.address:server.port pattern (fallback)
  - ruleName: infra_redisinstance_otel_logs
    compositeIdentifier:
      separator: ":"
      attributes:
        - server.address
        - server.port
    compositeName:
      fragments:
        - attribute: server.address
        - value: ":"
        - attribute: server.port
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Log
      - attribute: instrumentation.provider
        value: opentelemetry
      - attribute: newrelic.source
        value: "api.logs.otlp"
      - attribute: db.system
        value: "redis"
      - attribute: server.address
        present: true
      - attribute: server.port
        present: true
      # Only use composite when no custom identifier is provided
      - attribute: redis.instance.id
        present: false
    tags:
      server.address:
      server.port:
      host.name:
        ttl: P1D
      host.id:
        ttl: P1D
      cloud.provider:
      cloud.region:
      otel.library.name:
        entityTagName: instrumentation.name

  tags:
    # For OpenTelemetry
    telemetry.sdk.name:
      entityTagName: instrumentation.provider
    # AWS tags
    aws.region:

dashboardTemplates:
  # This should match the entity created from nri-redis in the infra pipeline
  newRelic:
    template: newrelic_dashboard.json
  # Redis receiver
  opentelemetry:
    template: opentelemetry_dashboard.json

goldenTags:
# Redis OHI
- redis.port
- redis.hostname
- redis.version
- redis.clusterRole
# OpenTelemetry - server.address pattern
- server.address
- server.port
# OpenTelemetry - redis.instance.id pattern
- service.name
- redis.instance.id
- host.name
- host.id
- redis.cluster.name

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
