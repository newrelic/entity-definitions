transactions:
  title: Transactions
  unit: COUNT
  queries:
    azure:
      select: sum(azure.elasticsan.elasticsans.Transactions)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
availability:
  title: Availability
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.elasticsan.elasticsans.Availability)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
usedCapacity:
  title: Used Capacity
  unit: BYTES
  queries:
    azure:
      select: sum(azure.elasticsan.elasticsans.ElasticSanUsedCapacity)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
