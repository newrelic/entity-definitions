queriesPerSecond:
  title: Queries Per Second
  unit: COUNT
  queries:
    azure:
      select: sum(azure.network.dnsresolvers.QPS)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
inboundEndpointCount:
  title: Inbound Endpoint Count
  unit: COUNT
  queries:
    azure:
      select: average(azure.network.dnsresolvers.InboundEndpointCount)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
outboundEndpointCount:
  title: Outbound Endpoint Count
  unit: COUNT
  queries:
    azure:
      select: average(azure.network.dnsresolvers.OutboundEndpointCount)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
