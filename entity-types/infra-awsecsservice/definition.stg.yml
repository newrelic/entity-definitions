domain: INFRA
type: AWSECSSERVICE
goldenTags:
- aws.clusterName
- aws.awsRegion
- aws.region
- aws.launchType
- aws.serviceStatus
- aws.accountId

synthesis:
  rules:
    # AWS ECS Service via OpenTelemetry ECS task metrics
    - ruleName: infra_awsecsservice_otel_stg
      identifier: aws.ecs.service.name
      name: aws.ecs.service.name
      encodeIdentifierInGUID: true
      legacyFeatures:
        overrideGuidType: true
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: newrelic.source
          value: api.metrics.otlp
        - attribute: cloud.platform
          value: aws_ecs
        - attribute: aws.ecs.service.name
          present: true
        - attribute: aws.ecs.cluster.name
          present: true
        - attribute: metricName
          prefix: ecs.task.
      tags:
        # ECS Service attributes
        aws.ecs.service.name:
          entityTagName: aws.serviceName
        # ECS Cluster attributes
        aws.ecs.cluster.name:
          entityTagName: aws.clusterName
        aws.arn:
          entityTagName: aws.clusterArn
        # Cloud attributes
        cloud.provider:
        cloud.platform:
        cloud.account.id:
          entityTagName: aws.accountId
        cloud.region:
          entityTagName: aws.awsRegion
        cloud.availability_zone:
          entityTagName: aws.availabilityZone
        # Launch type context
        aws.ecs.launchtype:
          entityTagName: aws.launchType
        aws.ecs.task.launch_type:
          entityTagName: aws.launchType
        # Instrumentation
        instrumentation.provider:

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "Cloud Monitoring Platform"
  secondaryOwners:
    - teamName: "OnHost Agent and Integrations"
