cpuUsage:
  title: CPU usage (%)
  unit: PERCENTAGE
  queries:
    aws:
      select: average(aws.ecs.CPUUtilization.byService)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    awsSample:
      select: average(provider.cpuUtilization.Average)
      from: ComputeSample
      where: provider='EcsService'
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: average(`ecs.task.cpu.utilized`)
      from: Metric
      where: instrumentation.provider='opentelemetry' AND cloud.platform='aws_ecs'
      eventId: entity.guid
      eventName: entity.name
memoryUsage:
  title: Memory usage (%)
  unit: PERCENTAGE
  queries:
    aws:
      select: average(aws.ecs.MemoryUtilization.byService)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    awsSample:
      select: average(provider.memoryUtilization.Average)
      from: ComputeSample
      where: provider='EcsService'
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: (sum(`ecs.task.memory.usage`) / sum(`ecs.task.memory.usage.limit`)) * 100
      from: Metric
      where: instrumentation.provider='opentelemetry' AND cloud.platform='aws_ecs'
      eventId: entity.guid
      eventName: entity.name
runningTasksCount:
  title: Running tasks
  unit: COUNT
  queries:
    opentelemetry:
      select: uniqueCount(aws.ecs.task.id)
      from: Metric
      where: instrumentation.provider='opentelemetry' AND cloud.platform='aws_ecs' AND aws.ecs.task.known_status='RUNNING'
      eventId: entity.guid
      eventName: entity.name
networkRxRate:
  title: Network Rx rate
  unit: BYTES_PER_SECOND
  queries:
    opentelemetry:
      select: sum(`ecs.task.network.rate.rx`)
      from: Metric
      where: instrumentation.provider='opentelemetry' AND cloud.platform='aws_ecs'
      eventId: entity.guid
      eventName: entity.name
networkTxRate:
  title: Network Tx rate
  unit: BYTES_PER_SECOND
  queries:
    opentelemetry:
      select: sum(`ecs.task.network.rate.tx`)
      from: Metric
      where: instrumentation.provider='opentelemetry' AND cloud.platform='aws_ecs'
      eventId: entity.guid
      eventName: entity.name
