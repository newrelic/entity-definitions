# Staging-only override of definition.yml. Replaces the original in STG.
# Carries the existing nri-mq rules plus a new OpenTelemetry rule (IBM mq_otel exporter).

domain: INFRA
type: IBMMQ_MANAGER

synthesis:
  rules:
    # nri-mq pipeline (Prometheus exporter).
    - ruleName: infra_ibmmq_manager_composite_stg
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_qmgr
      tags:
        clusterName:

    - ruleName: infra_ibmmq_manager_composite_2_stg
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_channel
      tags:
        clusterName:

    - ruleName: infra_ibmmq_manager_composite_3_stg
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_subscription
      tags:
        clusterName:

    # OpenTelemetry pipeline. Verified attributes from live NRDot collector data:
    # ibmmq.queue_manager.name (qmgr name), targetName (host running the collector).
    # otel.library.name is the prometheus receiver since IBM's mq_prometheus
    # exporter is scraped by the collector's prometheus receiver.
    - ruleName: infra_ibmmq_manager_otel_stg
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - ibmmq.queue_manager.name
      name: ibmmq.queue_manager.name
      encodeIdentifierInGUID: true
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq.qmgr.
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
        - attribute: ibmmq.queue_manager.name
          present: true
      tags:
        ibmmq.queue_manager.name:
          entityTagName: qmgr
        targetName:
        platform:
        cluster:
          entityTagName: clusterName
        deployment.environment:
        service.version:
        otel.library.name:
          entityTagName: instrumentation.name
        instrumentation.provider:

  tags:
    instrumentation.provider:

goldenTags:
  - qmgr
  - targetName
  - clusterName

dashboardTemplates:
  newRelic:
    template: newrelic_dashboard.json
  opentelemetry:
    template: opentelemetry_dashboard.stg.json

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
