domain: INFRA
type: IBMMQ_MANAGER

synthesis:
  rules:
    # nri-mq rules (staging): native identity = targetName:qmgr, matching prod (OTel excluded via instrumentation.provider absent).
    - ruleName: infra_ibmmq_manager_nri_stg_1
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_qmgr
        - attribute: instrumentation.provider
          present: false
      tags:
        clusterName:

    - ruleName: infra_ibmmq_manager_nri_stg_2
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_channel
        - attribute: instrumentation.provider
          present: false
      tags:
        clusterName:

    - ruleName: infra_ibmmq_manager_nri_stg_3
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_subscription
        - attribute: instrumentation.provider
          present: false
      tags:
        clusterName:

    # OpenTelemetry rule (Prometheus receiver): underscored metrics; identity keyed on target.name:qmgr.
    - ruleName: infra_ibmmq_manager_otel_stg
      compositeIdentifier:
        separator: ":"
        attributes:
          - target.name
          - qmgr
      encodeIdentifierInGUID: true
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_qmgr
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
        - attribute: qmgr
          present: true
        - attribute: queue
          present: false
      tags:
        qmgr:
        target.name:
        cluster.name:
          entityTagName: clusterName
        otel.library.name:
          entityTagName: instrumentation.name
        instrumentation.provider:
        host.id:
          ttl: P1D
        host.name:
          ttl: P1D
        k8s.pod.name:
          ttl: P1D
        k8s.node.name:
          ttl: P1D
        k8s.pod.uid:
          ttl: P1D
        k8s.namespace.name:
          ttl: P1D

goldenTags:
  - qmgr

dashboardTemplates:
  newRelic:
    template: newrelic_dashboard.json
  opentelemetry:
    template: opentelemetry_dashboard.stg.json

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
