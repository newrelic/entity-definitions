domain: INFRA
type: IBMMQ_MANAGER

synthesis:
  rules:
    # --- Production nri-mq rules (carried over verbatim from definition.yml) ---
    - ruleName: infra_ibmmq_manager_nri_stg_1
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_qmgr
      tags:
        clusterName:

    - ruleName: infra_ibmmq_manager_nri_stg_2
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_channel

      tags:
        clusterName:

    - ruleName: infra_ibmmq_manager_nri_stg_3
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_subscription

      tags:
        clusterName:

    # --- New OpenTelemetry rule (IBM MQ Prometheus exporter scraped by the OTel collector
    #     prometheusreceiver). Identifier is ibmmq.queue_manager.name. ---
    - ruleName: infra_ibmmq_manager_otel_stg
      identifier: ibmmq.queue_manager.name
      name: ibmmq.queue_manager.name
      encodeIdentifierInGUID: true
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq.qmgr.
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
        - attribute: ibmmq.queue_manager.name
          present: true
      tags:
        ibmmq.queue_manager.name:
          entityTagName: qmgr
        cluster:
          entityTagName: clusterName
        otel.library.name:
          entityTagName: instrumentation.name
        instrumentation.provider:
        server.address:

goldenTags:
  - qmgr

dashboardTemplates:
  newRelic:
    template: newrelic_dashboard.json
  opentelemetry:
    template: opentelemetry_dashboard.stg.json

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
