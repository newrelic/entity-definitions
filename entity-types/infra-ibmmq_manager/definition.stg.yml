domain: INFRA
type: IBMMQ_MANAGER

synthesis:
  rules:
    # --- nri-mq rules (staging override: identity keyed on qmgr, encoded into the GUID,
    #     to match the OTel rule so native + OTel data converge on one entity per QM) ---
    - ruleName: infra_ibmmq_manager_nri_stg_1
      identifier: qmgr
      encodeIdentifierInGUID: true
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_qmgr
      tags:
        clusterName:

    - ruleName: infra_ibmmq_manager_nri_stg_2
      identifier: qmgr
      encodeIdentifierInGUID: true
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_channel

      tags:
        clusterName:

    - ruleName: infra_ibmmq_manager_nri_stg_3
      identifier: qmgr
      encodeIdentifierInGUID: true
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_subscription

      tags:
        clusterName:

    # --- OpenTelemetry rule (Prometheus exporter via OTel collector prometheusreceiver).
    #     Underscore metric names; identity keyed on qmgr, encoded into the GUID. ---
    - ruleName: infra_ibmmq_manager_otel_stg
      identifier: qmgr
      encodeIdentifierInGUID: true
      name: qmgr
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_qmgr
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
        - attribute: qmgr
          present: true
      tags:
        qmgr:
        clusterName:
        otel.library.name:
          entityTagName: instrumentation.name
        instrumentation.provider:
        host.id:
          ttl: P1D
        host.hostname:
          ttl: P1D
        k8s.pod.name:
          ttl: P1D
        k8s.node.name:
          ttl: P1D
        k8s.pod.uid:
          ttl: P1D
        k8s.namespace.name:
          ttl: P1D

goldenTags:
  - qmgr

dashboardTemplates:
  newRelic:
    template: newrelic_dashboard.json
  opentelemetry:
    template: opentelemetry_dashboard.stg.json

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
