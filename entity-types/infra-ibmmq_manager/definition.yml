domain: INFRA
type: IBMMQ_MANAGER

synthesis:
  rules:
    # OpenTelemetry pipeline (IBM mq_prometheus exporter scraped by NRDot collector).
    # Identifier is targetName + ibmmq.queue_manager.name (Stage 5 attribute rename).
    - ruleName: infra_ibmmq_manager_otel
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - ibmmq.queue_manager.name
      name: ibmmq.queue_manager.name
      encodeIdentifierInGUID: true
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq.qmgr.
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
        - attribute: ibmmq.queue_manager.name
          present: true
      tags:
        ibmmq.queue_manager.name:
          entityTagName: qmgr
        targetName:
        platform:
        cluster:
          entityTagName: clusterName
        deployment.environment:
        service.version:
        otel.library.name:
          entityTagName: instrumentation.name
        instrumentation.provider:

  tags:
    instrumentation.provider:

goldenTags:
  - qmgr
  - targetName
  - clusterName

dashboardTemplates:
  opentelemetry:
    template: opentelemetry_dashboard.json

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
