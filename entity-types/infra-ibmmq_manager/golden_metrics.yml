connections_count:
  title: Connections
  unit: COUNT
  queries:
    opentelemetry:
      select: average(`ibmmq.qmgr.connection_count`) AS 'Connections'
      from: Metric
      where: instrumentation.provider = 'opentelemetry'

put_messages_count:
  title: Put messages
  unit: COUNT
  queries:
    opentelemetry:
      select: average(`ibmmq.qmgr.interval.mqput.mqput1.total.count`) AS 'Put messages'
      from: Metric
      where: instrumentation.provider = 'opentelemetry'

get_messages_count:
  title: Get messages
  unit: COUNT
  queries:
    opentelemetry:
      select: average(`ibmmq.qmgr.interval.destructive.get.total.count`) AS 'Get messages'
      from: Metric
      where: instrumentation.provider = 'opentelemetry'

published_messages_count:
  title: Published messages
  unit: COUNT
  queries:
    opentelemetry:
      select: average(`ibmmq.qmgr.published.to.subscribers.message.count`) AS 'Published messages'
      from: Metric
      where: instrumentation.provider = 'opentelemetry'
