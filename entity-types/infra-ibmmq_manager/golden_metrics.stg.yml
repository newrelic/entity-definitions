connections_count:
  title: Connections
  unit: COUNT
  queries:
    newRelic:
      select: average(ibmmq_qmgr_connection_count) AS 'Connections'
      from: Metric
    opentelemetry:
      select: average(`ibmmq.qmgr.connection_count`) AS 'Connections'
      from: Metric

put_messages_count:
  title: Put messages
  unit: COUNT
  queries:
    newRelic:
      select: average(ibmmq_qmgr_interval_mqput_mqput1_total_count) AS 'Put messages'
      from: Metric
    opentelemetry:
      select: average(`ibmmq.qmgr.interval.mqput.mqput1.total.count`) AS 'Put messages'
      from: Metric

get_messages_count:
  title: Get messages
  unit: COUNT
  queries:
    newRelic:
      select: average(ibmmq_qmgr_interval_destructive_get_total_count) AS 'Get messages'
      from: Metric
    opentelemetry:
      select: average(`ibmmq.qmgr.interval.destructive.get.total.count`) AS 'Get messages'
      from: Metric

published_messages_count:
  title: Published messages
  unit: COUNT
  queries:
    newRelic:
      select: average(ibmmq_qmgr_published_to_subscribers_message_count) AS 'Published messages'
      from: Metric
    opentelemetry:
      select: average(`ibmmq.qmgr.published.to.subscribers.message.count`) AS 'Published messages'
      from: Metric
