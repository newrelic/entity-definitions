connections_count:
  title: Connections
  unit: COUNT
  queries:
    prometheus:
      select: average(ibmmq_qmgr_connection_count) AS 'Connections'
      from: Metric
    opentelemetry:
      select: average(ibmmq_qmgr_connection_count) AS 'Connections'
      from: Metric
      where: instrumentation.provider = 'opentelemetry'

put_messages_count:
  title: Put messages
  unit: COUNT
  queries:
    prometheus:
      select: average(ibmmq_qmgr_interval_mqput_mqput1_total_count) AS 'Put messages'
      from: Metric
    opentelemetry:
      select: average(ibmmq_qmgr_interval_mqput_mqput1_total_count) AS 'Put messages'
      from: Metric
      where: instrumentation.provider = 'opentelemetry'

get_messages_count:
  title: Get messages
  unit: COUNT
  queries:
    prometheus:
      select: average(ibmmq_qmgr_interval_destructive_get_total_count) AS 'Get messages'
      from: Metric
    opentelemetry:
      select: average(ibmmq_qmgr_interval_destructive_get_total_count) AS 'Get messages'
      from: Metric
      where: instrumentation.provider = 'opentelemetry'

published_messages_count:
  title: Published messages
  unit: COUNT
  queries:
    prometheus:
      select: average(ibmmq_qmgr_published_to_subscribers_message_count) AS 'Published messages'
      from: Metric
    opentelemetry:
      select: average(ibmmq_qmgr_published_to_subscribers_message_count) AS 'Published messages'
      from: Metric
      where: instrumentation.provider = 'opentelemetry'
