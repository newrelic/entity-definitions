ingressBytes:
  title: Ingress Bytes
  unit: BYTES
  queries:
    gcp:
      select: sum(`gcp.interconnect.network.interconnect.received_bytes_count`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
egressBytes:
  title: Egress Bytes
  unit: BYTES
  queries:
    gcp:
      select: sum(`gcp.interconnect.network.interconnect.sent_bytes_count`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
droppedPackets:
  title: Dropped Packets
  unit: COUNT
  queries:
    gcp:
      select: sum(`gcp.interconnect.network.interconnect.dropped_packets_count`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
