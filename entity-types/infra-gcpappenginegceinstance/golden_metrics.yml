Connections:
  title: Connections
  unit: COUNT
  queries:
    gcp:
      select: max(gcp.appengine.flex.autoscaler.connections.current)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
RequestCount:
  title: Request Count
  unit: COUNT
  queries:
    gcp:
      select: sum(gcp.appengine.flex.autoscaler.server.request_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
