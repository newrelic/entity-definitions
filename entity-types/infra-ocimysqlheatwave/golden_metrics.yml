cpuUtilization:
  title: CPU Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(`oci.mysql.database.cpu.utilization`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
memoryUtilization:
  title: Memory Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(`oci.mysql.database.memory.utilization`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
activeConnections:
  title: Active Connections
  unit: COUNT
  queries:
    oci:
      select: average(`oci.mysql.database.active.connections`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
statementLatency:
  title: Statement Latency
  unit: MS
  queries:
    oci:
      select: average(`oci.mysql.database.statement.latency`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
heatwaveQueriesPerSecond:
  title: HeatWave Queries per Second
  unit: COUNT
  queries:
    oci:
      select: rate(sum(`oci.mysql.database.heatwave.queries.per.second`), 1 second)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
replicationLag:
  title: Replication Lag
  unit: SECONDS
  queries:
    oci:
      select: average(`oci.mysql.database.replication.lag`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
