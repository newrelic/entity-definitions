availability:
  title: Availability (%)
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.healthcareapis.workspaces.fhirservices.Availability)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
totalRequests:
  title: Total requests
  unit: COUNT
  queries:
    azure:
      select: sum(azure.healthcareapis.workspaces.fhirservices.TotalRequests)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
totalLatency:
  title: Total latency (ms)
  unit: MS
  queries:
    azure:
      select: average(azure.healthcareapis.workspaces.fhirservices.TotalLatency)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
totalDataSize:
  title: Total data size
  unit: BYTES
  queries:
    azure:
      select: average(azure.healthcareapis.workspaces.fhirservices.TotalDataSize)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
