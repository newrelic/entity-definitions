cpuUtilization:
  title: CPU Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(`oci.goldengate.cpu.utilization`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

memoryUtilization:
  title: Memory Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(`oci.goldengate.memory.utilization`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

deploymentHealth:
  title: Deployment Health
  unit: PERCENTAGE
  queries:
    oci:
      select: latest(`oci.goldengate.deployment.health`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

deploymentInboundLag:
  title: Inbound Lag
  unit: SECONDS
  queries:
    oci:
      select: average(`oci.goldengate.deployment.inbound.lag`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

deploymentOutboundLag:
  title: Outbound Lag
  unit: SECONDS
  queries:
    oci:
      select: average(`oci.goldengate.deployment.outbound.lag`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

filesystemUsage:
  title: Filesystem Usage
  unit: BYTES
  queries:
    oci:
      select: latest(`oci.goldengate.file.system.usage`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
