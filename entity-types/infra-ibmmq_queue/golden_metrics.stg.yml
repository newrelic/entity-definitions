  unit: COUNT
  queries:
    newRelic:
      select: average(ibmmq_queue_expired_messages) AS 'Expired messages'
      from: Metric
    opentelemetry:
      select: average(`ibmmq.queue.expired.messages`) AS 'Expired messages'
      from: Metric
