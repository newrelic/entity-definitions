depth_count:
  title: Depth
  unit: COUNT
  queries:
    opentelemetry:
      select: average(`ibmmq.queue.depth`) AS 'Depth'
      from: Metric
      where: instrumentation.provider = 'opentelemetry'

queue_get_messages:
  title: Get messages
  unit: COUNT
  queries:
    opentelemetry:
      select: average(`ibmmq.queue.mqget.count`) AS 'Get messages'
      from: Metric
      where: instrumentation.provider = 'opentelemetry'

queue_put_messages:
  title: Put messages
  unit: COUNT
  queries:
    opentelemetry:
      select: average(`ibmmq.queue.mqput.count`) AS 'Put messages'
      from: Metric
      where: instrumentation.provider = 'opentelemetry'

queue_uncommitted_messages:
  title: Uncommitted messages
  unit: COUNT
  queries:
    opentelemetry:
      select: average(`ibmmq.queue.uncommitted.messages`) AS 'Uncommitted messages'
      from: Metric
      where: instrumentation.provider = 'opentelemetry'

queue_expired_messages:
  title: Expired messages
  unit: COUNT
  queries:
    opentelemetry:
      select: average(`ibmmq.queue.expired.messages`) AS 'Expired messages'
      from: Metric
      where: instrumentation.provider = 'opentelemetry'
