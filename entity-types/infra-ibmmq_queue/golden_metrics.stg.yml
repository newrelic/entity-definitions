depth_count:
  title: Depth
  unit: COUNT
  queries:
    newRelic:
      select: average(ibmmq_queue_depth) AS 'Depth'
      from: Metric
    opentelemetry:
      select: average(`ibmmq.queue.depth`) AS 'Depth'
      from: Metric

queue_get_messages:
  title: Get messages
  unit: COUNT
  queries:
    newRelic:
      select: average(ibmmq_queue_mqget_count) AS 'Get messages'
      from: Metric
    opentelemetry:
      select: average(`ibmmq.queue.mqget.count`) AS 'Get messages'
      from: Metric

queue_put_messages:
  title: Put messages
  unit: COUNT
  queries:
    newRelic:
      select: average(ibmmq_queue_mqput_mqput1_count) AS 'Put messages'
      from: Metric
    opentelemetry:
      select: average(`ibmmq.queue.mqput.count`) AS 'Put messages'
      from: Metric

queue_uncommitted_messages:
  title: Uncommitted messages
  unit: COUNT
  queries:
    newRelic:
      select: average(ibmmq_queue_uncommitted_messages) AS 'Uncommitted messages'
      from: Metric
    opentelemetry:
      select: average(`ibmmq.queue.uncommitted.messages`) AS 'Uncommitted messages'
      from: Metric

queue_expired_messages:
