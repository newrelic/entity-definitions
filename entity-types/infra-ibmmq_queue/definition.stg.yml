domain: INFRA
type: IBMMQ_QUEUE
goldenTags:
  - qmgr

synthesis:
  rules:
    # --- Production nri-mq rule (carried over verbatim from definition.yml) ---
    - ruleName: infra_ibmmq_queue_nri_stg_1
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
          - queue
      encodeIdentifierInGUID: true
      name: queue
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_queue
      tags:
        qmgr:

    # --- OpenTelemetry rule (Prometheus exporter via OTel collector prometheusreceiver).
    #     Underscore metric names + shared native identity (targetName:qmgr:queue) to avoid duplicate entities. ---
    - ruleName: infra_ibmmq_queue_otel_stg_1
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
          - queue
      encodeIdentifierInGUID: true
      name: queue
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_queue
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
        - attribute: qmgr
          present: true
        - attribute: queue
          present: true
      tags:
        qmgr:
        queue:
        usage:
        clusterName:
        otel.library.name:
          entityTagName: instrumentation.name
        instrumentation.provider:
        host.id:
          ttl: P1D
        host.hostname:
          ttl: P1D
        k8s.pod.name:
          ttl: P1D
        k8s.node.name:
          ttl: P1D
        k8s.pod.uid:
          ttl: P1D
        k8s.namespace.name:
          ttl: P1D


dashboardTemplates:
  newRelic:
    template: newrelic_dashboard.json
  opentelemetry:
    template: opentelemetry_dashboard.stg.json

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
