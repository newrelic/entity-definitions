domain: INFRA
type: IBMMQ_QUEUE
goldenTags:
  - qmgr

synthesis:
  rules:
    # --- Production nri-mq rule (carried over verbatim from definition.yml) ---
    - ruleName: infra_ibmmq_queue_nri_stg_1
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
          - queue
      encodeIdentifierInGUID: true
      name: queue
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_queue
      tags:
        qmgr:

    # --- New OpenTelemetry rule. Identifier is targetName + ibmmq.queue_manager.name + ibmmq.queue.
    #     Composite name is qmgr:queue so two managers can share a queue name without collision. ---
    - ruleName: infra_ibmmq_queue_otel_stg_1
      compositeIdentifier:
        separator: ":"
        attributes:
          - ibmmq.queue_manager.name
          - ibmmq.queue
      encodeIdentifierInGUID: true
      compositeName:
        fragments:
          - attribute: ibmmq.queue_manager.name
          - value: ":"
          - attribute: ibmmq.queue
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq.queue.
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
        - attribute: ibmmq.queue_manager.name
          present: true
        - attribute: ibmmq.queue
          present: true
      tags:
        ibmmq.queue_manager.name:
          entityTagName: qmgr
        ibmmq.queue:
          entityTagName: queue
        usage:
        cluster:
          entityTagName: clusterName
        deployment.environment:
        otel.library.name:
          entityTagName: instrumentation.name
        instrumentation.provider:


dashboardTemplates:
  newRelic:
    template: newrelic_dashboard.json
  opentelemetry:
    template: opentelemetry_dashboard.stg.json

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
