domain: INFRA
type: IBMMQ_QUEUE
goldenTags:
  - qmgr

synthesis:
  rules:
    # nri-mq rule (staging): native identity = targetName:qmgr:queue, matching prod (OTel excluded via instrumentation.provider absent).
    - ruleName: infra_ibmmq_queue_nri_stg_1
      compositeIdentifier:
        separator: ":"
        attributes:
          - targetName
          - qmgr
          - queue
      encodeIdentifierInGUID: true
      compositeName:
        fragments:
          - attribute: queue
          - value: " ("
          - attribute: qmgr
          - value: ")"
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_queue
        - attribute: instrumentation.provider
          present: false
      tags:
        qmgr:

    # OpenTelemetry rule (Prometheus receiver): underscored metrics; identity keyed on target.name:qmgr:queue.
    - ruleName: infra_ibmmq_queue_otel_stg_1
      compositeIdentifier:
        separator: ":"
        attributes:
          - target.name
          - qmgr
          - queue
      encodeIdentifierInGUID: true
      compositeName:
        fragments:
          - attribute: queue
          - value: " ("
          - attribute: qmgr
          - value: ")"
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: metricName
          prefix: ibmmq_queue
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: otel.library.name
          value: github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver
        - attribute: qmgr
          present: true
        - attribute: queue
          present: true
      tags:
        qmgr:
        queue:
        target.name:
        usage:
        cluster.name:
          entityTagName: clusterName
        otel.library.name:
          entityTagName: instrumentation.name
        instrumentation.provider:
        server.address:
          ttl: P1D
        host.id:
          ttl: P1D
        host.name:
          ttl: P1D
        k8s.pod.name:
          ttl: P1D
        k8s.node.name:
          ttl: P1D
        k8s.pod.uid:
          ttl: P1D
        k8s.namespace.name:
          ttl: P1D


dashboardTemplates:
  newRelic:
    template: newrelic_dashboard.json
  opentelemetry:
    template: opentelemetry_dashboard.stg.json

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
