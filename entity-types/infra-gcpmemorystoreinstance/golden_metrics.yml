cpuUtilization:
  title: CPU utilization (%)
  unit: PERCENTAGE
  queries:
    gcp:
      select: max(`gcp.memorystore.instance.cpu.maximum_utilization`) * 100
      from: Metric
      eventId: entity.guid
      eventName: entity.name

memoryUtilization:
  title: Memory utilization (%)
  unit: PERCENTAGE
  queries:
    gcp:
      select: max(`gcp.memorystore.instance.memory.maximum_utilization`) * 100
      from: Metric
      eventId: entity.guid
      eventName: entity.name

connectedClients:
  title: Connected clients
  unit: COUNT
  queries:
    gcp:
      select: average(`gcp.memorystore.instance.clients.total_connected_clients`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
