cpuUsageTime:
  title: CPU Usage Time
  unit: SECONDS
  queries:
    gcp:
      select: sum(gcp.composer.workload.cpu.usage_time)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
memoryUsage:
  title: Memory Usage
  unit: BYTES
  queries:
    gcp:
      select: average(gcp.composer.workload.memory.bytes_used)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
restartCount:
  title: Restart Count
  unit: COUNT
  queries:
    gcp:
      select: sum(gcp.composer.workload.restart_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
