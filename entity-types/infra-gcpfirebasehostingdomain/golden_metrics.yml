sentBytesCount:
  title: Sent Bytes
  unit: BYTES
  queries:
    gcp:
      select: sum(gcp.firebasehosting.network.sent_bytes_count)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

monthlySent:
  title: Monthly Sent Bytes
  unit: BYTES
  queries:
    gcp:
      select: average(gcp.firebasehosting.network.monthly_sent)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

storageTotalBytes:
  title: Storage Total Bytes
  unit: BYTES
  queries:
    gcp:
      select: average(gcp.firebasehosting.storage.total_bytes)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
