domain: EXT
type: CICD_PROVIDER

synthesis:
  rules:
    # telemetry with cicdProviderName attribute
  - ruleName: ext_cicd_provider_name_telemetry
    identifier: cicdProviderName
    name: cicdProviderName
    encodeIdentifierInGUID: true
    conditions:
    - attribute: cicdProviderName
      present: true

    # telemetry with pipelineProviderName attribute
  - ruleName: ext_pipeline_provider_name_telemetry
    identifier: pipelineProviderName
    name: pipelineProviderName
    encodeIdentifierInGUID: true
    conditions:
    - attribute: pipelineProviderName
      present: true

configuration:
  entityExpirationTime: EIGHT_DAYS
  alertable: true

ownership:
  primaryOwner:
    teamName: "NewRelic Community"

