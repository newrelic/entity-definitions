domain: INFRA
type: AWSECSCLUSTER
goldenTags:
- aws.awsRegion
- aws.region
- aws.clusterStatus
- aws.accountId

synthesis:
  rules:
    # AWS ECS Cluster via OpenTelemetry ECS task metrics
    - ruleName: infra_awsecscluster_otel_stg
      identifier: aws.arn
      name: aws.ecs.cluster.name
      encodeIdentifierInGUID: true
      legacyFeatures:
        overrideGuidType: true
      conditions:
        - attribute: eventType
          value: Metric
        - attribute: instrumentation.provider
          value: opentelemetry
        - attribute: newrelic.source
          value: api.metrics.otlp
        - attribute: cloud.platform
          value: aws_ecs
        - attribute: aws.ecs.cluster.name
          present: true
        - attribute: aws.arn
          present: true
      tags:
        aws.arn:
        # ECS Cluster attributes
        aws.ecs.cluster.name:
          entityTagName: aws.clusterName
        # Cloud attributes
        cloud.provider:
        cloud.platform:
        cloud.account.id:
          entityTagName: aws.accountId
        cloud.region:
          entityTagName: aws.awsRegion
        cloud.availability_zone:
          entityTagName: aws.availabilityZone
        # Launch type context
        aws.ecs.launchtype:
          entityTagName: aws.launchType
        # Instrumentation
        instrumentation.provider:

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "Cloud Monitoring Platform"
  secondaryOwners:
    - teamName: "OnHost Agent and Integrations"
