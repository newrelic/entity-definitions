cpu:
  title: CPU (%)
  unit: PERCENTAGE
  queries:
    azure:
      select: average(azure.dbforpostgresql.servergroupsv2.cpu_percent)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    azureSample:
      select: average(cpuPercent.Average)
      from: AzurePostgreSqlServerGroupsv2Sample
      eventId: entityGuid
      eventName: entityName
