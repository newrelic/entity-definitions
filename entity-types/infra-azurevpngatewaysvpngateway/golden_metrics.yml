averageBandwidth:
  title: Gateway S2S Bandwidth
  unit: BYTES_PER_SECOND
  queries:
    azure:
      select: average(azure.network.virtualnetworkgateways.AverageBandwidth)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
tunnelIngressBytes:
  title: Tunnel Ingress Bytes
  unit: BYTES
  queries:
    azure:
      select: sum(azure.network.virtualnetworkgateways.TunnelIngressBytes)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
tunnelEgressBytes:
  title: Tunnel Egress Bytes
  unit: BYTES
  queries:
    azure:
      select: sum(azure.network.virtualnetworkgateways.TunnelEgressBytes)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
p2sConnectionCount:
  title: P2S Connection Count
  unit: COUNT
  queries:
    azure:
      select: sum(azure.network.virtualnetworkgateways.P2SConnectionCount)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
