sessions:
  title: Session Count
  unit: COUNT
  queries:
    azure:
      select: sum(azure.network.bastionhosts.sessions)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
cpuUsage:
  title: CPU Usage
  unit: COUNT
  queries:
    azure:
      select: average(azure.network.bastionhosts.usage_user)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
memoryUsage:
  title: Memory Usage
  unit: COUNT
  queries:
    azure:
      select: average(azure.network.bastionhosts.used)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
