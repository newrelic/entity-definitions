queries:
  title: Queries
  unit: COUNT
  queries:
    gcp:
      select: sum(`gcp.bigquery.query.count`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: sum(`query.Count`)
      from: GcpBigQueryProjectSample
      eventId: entityGuid
      eventName: entityName
executionTime:
  title: Execution time
  unit: SECONDS
  queries:
    gcp:
      select: average(`gcp.bigquery.query.execution_times`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
    gcpSample:
      select: average(`query.ExecutionTimes`)
      from: GcpBigQueryProjectSample
      eventId: entityGuid
      eventName: entityName
queryScannedBytes:
  title: Query scanned bytes
  unit: BYTES
  queries:
    gcp:
      select: sum(`gcp.bigquery.query.scanned_bytes`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
slotsAllocated:
  title: Slots allocated
  unit: COUNT
  queries:
    gcp:
      select: average(`gcp.bigquery.slots.allocated_for_project`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
