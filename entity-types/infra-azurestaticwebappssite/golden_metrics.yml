siteHits:
  title: Site Hits
  unit: COUNT
  queries:
    azure:
      select: sum(azure.web.staticsites.SiteHits)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
siteErrors:
  title: Site Errors
  unit: COUNT
  queries:
    azure:
      select: sum(azure.web.staticsites.SiteErrors)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
bytesSent:
  title: Data Out
  unit: BYTES
  queries:
    azure:
      select: sum(azure.web.staticsites.BytesSent)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
