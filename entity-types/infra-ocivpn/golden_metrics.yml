tunnelState:
  title: Tunnel State
  unit: COUNT
  queries:
    oci:
      select: latest(`oci.vpn.tunnel.state`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
bytesReceived:
  title: Bytes Received
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.vpn.bytes.received`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
bytesSent:
  title: Bytes Sent
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.vpn.bytes.sent`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
packetsReceived:
  title: Packets Received
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.vpn.packets.received`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
packetsSent:
  title: Packets Sent
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.vpn.packets.sent`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
packetsError:
  title: Packets with Errors
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.vpn.packets.error`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
