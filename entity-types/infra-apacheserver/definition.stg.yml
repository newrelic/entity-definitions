domain: INFRA
type: APACHESERVER

synthesis:
  rules:
  # OpenTelemetry synthesis rule - new collector format
  - ruleName: infra_apacheserver_otel_new
    compositeIdentifier:
      separator: ":"
      attributes:
        - apache.server.name
        - apache.server.port
    name: apache.server.name
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      - attribute: metricName
        prefix: apache.
      - attribute: instrumentation.provider
        value: opentelemetry
      # New collector format
      - attribute: otel.library.name
        value: "github.com/open-telemetry/opentelemetry-collector-contrib/receiver/apachereceiver"
    tags:
      # Required resource attributes
      apache.server.name:
      apache.server.port:
      host.name:
        ttl: P1D
      host.id:
        ttl: P1D
      # Environment resource attributes
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      # Kubernetes attributes (optional)
      k8s.cluster.name:
        ttl: P1D
      k8s.namespace.name:
        ttl: P1D
      k8s.pod.name:
        ttl: P1D
      # OTel attributes
      otel.library.name:
        entityTagName: instrumentation.name

  # OpenTelemetry synthesis rule - old collector format
  - ruleName: infra_apacheserver_otel_old
    compositeIdentifier:
      separator: ":"
      attributes:
        - apache.server.name
        - apache.server.port
    name: apache.server.name
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      - attribute: metricName
        prefix: apache.
      - attribute: instrumentation.provider
        value: opentelemetry
      # Old collector format
      - attribute: otel.library.name
        value: "otelcol/apachereceiver"
    tags:
      # Required resource attributes
      apache.server.name:
      apache.server.port:
      host.name:
        ttl: P1D
      host.id:
        ttl: P1D
      # Environment resource attributes
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      # Kubernetes attributes (optional)
      k8s.cluster.name:
        ttl: P1D
      k8s.namespace.name:
        ttl: P1D
      k8s.pod.name:
        ttl: P1D
      # OTel attributes
      otel.library.name:
        entityTagName: instrumentation.name

  tags:
    # For OpenTelemetry
    telemetry.sdk.name:
      entityTagName: instrumentation.provider

goldenTags:
- apache.server.name
- apache.server.port
- apache.version
- host.name
- host.id
# Kubernetes attributes
- k8s.cluster.name
- k8s.namespace.name
- k8s.pod.name

configuration:
  entityExpirationTime: DAILY
  alertable: true

dashboardTemplates:
  # This should match the entity created from the ohi in the infra pipeline
  newRelic:
    template: newrelic_dashboard.json
  opentelemetry:
    template: opentelemetry_dashboard.json

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
