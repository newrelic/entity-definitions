domain: INFRA
type: APACHESERVER
goldenTags:
- apache.hostname
- apache.port
- apache.version
# Open Telemetry
- apache.server.name
- apache.server.port

configuration:
  entityExpirationTime: DAILY
  alertable: true

dashboardTemplates:
  # This should match the entity created from the ohi in the infra pipeline
  newRelic:
    template: newrelic_dashboard.json
  opentelemetry:
    template: opentelemetry_dashboard.json

synthesis:
  rules:
  # Legacy short-form library name. Older OHI-bundled / wrapped collectors
  # emit `otelcol/apachereceiver` as the InstrumentationScope name.
  - ruleName: infra_apacheserver_composite
    compositeIdentifier:
      separator: ":"
      attributes:
        - apache.server.name
        - apache.server.port
    name: apache.server.name
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      - attribute: metricName
        prefix: apache.
      - attribute: instrumentation.provider
        value: opentelemetry
      # This filters only metrics coming from apache receiver, given that metrics
      # could deffer between different runtime receivers.
      - attribute: otel.library.name
        value: otelcol/apachereceiver
    tags:
      # Environment resource attributes
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      # OTel attributes
      otel.library.name:
        entityTagName: instrumentation.name
      apache.server.name:
      apache.server.port:

  # Modern full GitHub-URL library name. Standalone
  # opentelemetry-collector-contrib emits the full URL form as the
  # InstrumentationScope name. Same identifier/name as the legacy rule, so
  # both sources produce the same APACHESERVER entity.
  - ruleName: infra_apacheserver_otel_contrib
    compositeIdentifier:
      separator: ":"
      attributes:
        - apache.server.name
        - apache.server.port
    name: apache.server.name
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      - attribute: metricName
        prefix: apache.
      - attribute: instrumentation.provider
        value: opentelemetry
      - attribute: otel.library.name
        value: "github.com/open-telemetry/opentelemetry-collector-contrib/receiver/apachereceiver"
    tags:
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      otel.library.name:
        entityTagName: instrumentation.name
      apache.server.name:
      apache.server.port:

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
