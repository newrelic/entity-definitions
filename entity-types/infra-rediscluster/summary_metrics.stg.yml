clusterState:
  title: Cluster State
  unit: COUNT
  queries:
    opentelemetry:
      select: latest(redis.cluster.state)
      from: Metric
      where: metricName = 'redis.cluster.state'
      eventId: entity.guid
      eventName: entity.name
clusterSlotsOk:
  title: Slots OK
  unit: COUNT
  queries:
    opentelemetry:
      select: latest(redis.cluster.slots_ok)
      from: Metric
      where: metricName = 'redis.cluster.slots_ok'
      eventId: entity.guid
      eventName: entity.name
clusterKnownNodes:
  title: Known Nodes
  unit: COUNT
  queries:
    opentelemetry:
      select: latest(redis.cluster.known_nodes)
      from: Metric
      where: metricName = 'redis.cluster.known_nodes'
      eventId: entity.guid
      eventName: entity.name
