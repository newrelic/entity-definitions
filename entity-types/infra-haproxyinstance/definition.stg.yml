domain: INFRA
type: HAPROXYINSTANCE

synthesis:
  rules:
  # OpenTelemetry synthesis rule (new collector format)
  # Requires: resourcedetection processor (adds host.name) + haproxyreceiver (adds haproxy.addr)
  - ruleName: infra_haproxyinstance_otel_new
    compositeIdentifier:
      separator: ":"
      attributes:
        - host.name
        - haproxy.addr
    name: host.name
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      - attribute: metricName
        prefix: haproxy.
      - attribute: instrumentation.provider
        value: opentelemetry
      - attribute: host.name
        present: true
      - attribute: haproxy.addr
        present: true
      # New collector format (otelcol-contrib v0.80+)
      - attribute: otel.library.name
        value: "github.com/open-telemetry/opentelemetry-collector-contrib/receiver/haproxyreceiver"
    tags:
      # Identity attributes
      host.name:
        ttl: P1D
      haproxy.addr:
      # HAProxy-specific attributes (natively emitted by haproxyreceiver)
      haproxy.proxy_name:
      haproxy.service_name:
      # Environment attributes (from resourcedetection processor)
      os.type:
      host.id:
        ttl: P1D
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      # Kubernetes attributes (from resourcedetection with k8s detector)
      k8s.cluster.name:
        ttl: P1D
      k8s.namespace.name:
        ttl: P1D
      k8s.pod.name:
        ttl: P1D
      k8s.node.name:
        ttl: P1D
      # OTel attributes
      otel.library.name:
        entityTagName: instrumentation.name

  # OpenTelemetry synthesis rule (old collector format)
  - ruleName: infra_haproxyinstance_otel_old
    compositeIdentifier:
      separator: ":"
      attributes:
        - host.name
        - haproxy.addr
    name: host.name
    encodeIdentifierInGUID: true
    conditions:
      - attribute: eventType
        value: Metric
      - attribute: metricName
        prefix: haproxy.
      - attribute: instrumentation.provider
        value: opentelemetry
      - attribute: host.name
        present: true
      - attribute: haproxy.addr
        present: true
      # Old collector format (otelcol-contrib < v0.80)
      - attribute: otel.library.name
        value: "otelcol/haproxyreceiver"
    tags:
      # Identity attributes
      host.name:
        ttl: P1D
      haproxy.addr:
      # HAProxy-specific attributes (natively emitted by haproxyreceiver)
      haproxy.proxy_name:
      haproxy.service_name:
      # Environment attributes (from resourcedetection processor)
      os.type:
      host.id:
        ttl: P1D
      host.type:
      cloud.provider:
      cloud.account.id:
      cloud.region:
      # Kubernetes attributes (from resourcedetection with k8s detector)
      k8s.cluster.name:
        ttl: P1D
      k8s.namespace.name:
        ttl: P1D
      k8s.pod.name:
        ttl: P1D
      k8s.node.name:
        ttl: P1D
      # OTel attributes
      otel.library.name:
        entityTagName: instrumentation.name

  tags:
    # For OpenTelemetry
    telemetry.sdk.name:
      entityTagName: instrumentation.provider

goldenTags:
- host.name
- haproxy.addr
- os.type
- cloud.provider
- cloud.region
- k8s.cluster.name
- k8s.namespace.name

configuration:
  entityExpirationTime: DAILY
  alertable: true

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
