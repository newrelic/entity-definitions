brokerCount:
  title: Brokers
  unit: COUNT
  queries:
    newRelic:
      select: latest(cluster.activeBrokerCount)
      from: KafkaClusterSample
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: latest(kafka.brokers)
      from: Metric
      where: metricName='kafka.brokers'
      eventId: entity.guid

TopicCount:
  title: Topics
  unit: COUNT
  queries:
    newRelic:
      select: latest(cluster.globalTopicCount)
      from: KafkaClusterSample
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: latest(kafka.cluster.topic.count)
      from: Metric
      where: metricName='kafka.cluster.topic.count' and getField(kafka.cluster.topic.count , 'latest') > 0
      eventId: entity.guid

partitionCount:
  title: Partitions
  unit: COUNT
  queries:
    newRelic:
      select: latest(cluster.globalPartitionCount)
      from: KafkaClusterSample
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: latest(kafka.cluster.partition.count)
      from: Metric
      where: metricName='kafka.cluster.partition.count' and getField(kafka.cluster.partition.count , 'latest') > 0
      eventId: entity.guid
    gcp:
      select: latest(gcp.managedkafka.partitions)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

offlinePartitions:
  title: Offline partitions
  unit: COUNT
  queries:
    newRelic:
      select: max(cluster.offlinePartitionsCount)
      from: KafkaClusterSample
      eventId: entityGuid
      eventName: entityName
    opentelemetry:
      select: max(kafka.partition.offline)
      from: Metric
      where: metricName='kafka.partition.offline'
      eventId: entity.guid
    gcp:
      select: max(gcp.managedkafka.offline_partitions)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

gcpCpuUsage:
  title: CPU Usage (vCPU/s)
  unit: COUNT
  queries:
    gcp:
      select: rate(sum(gcp.managedkafka.cpu.core_usage_time), 1 minute)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

gcpRequestLatency:
  title: Request Latency p99 (ms)
  unit: MS
  queries:
    gcp:
      select: average(gcp.managedkafka.request_latencies)
      from: Metric
      where: "metric.percentile = '99'"
      eventId: entity.guid
      eventName: entity.name
