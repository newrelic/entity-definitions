monitoringStatus:
  title: Monitoring Status
  unit: COUNT
  queries:
    oci:
      select: latest(`oci.stackmonitoring.monitoring.status`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

cpuUtilization:
  title: CPU Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(`oci.stackmonitoring.cpu.utilization`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

memoryUtilization:
  title: Memory Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(`oci.stackmonitoring.memory.utilization`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

filesystemUtilization:
  title: Filesystem Utilization
  unit: PERCENTAGE
  queries:
    oci:
      select: average(`oci.stackmonitoring.filesystem.utilization`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

networkActivitySummary:
  title: Network Activity
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.stackmonitoring.network.activity.summary`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
