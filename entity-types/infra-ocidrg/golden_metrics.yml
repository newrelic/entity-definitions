      eventId: entity.guid
      eventName: entity.name

packetDropsFromDrgAttachment:
  title: Packet Drops from DRG Attachment
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.dynamic.routing.gateway.packet.drops.from.drg.attachment`)
