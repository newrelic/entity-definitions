      eventId: entity.guid
      eventName: entity.name

packetsToDrgAttachment:
  title: Packets Sent from DRG
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.dynamic.routing.gateway.packets.to.drg.attachment`)
