drgAttachmentState:
  title: DRG Attachment State
  unit: COUNT
  queries:
    oci:
      select: latest(`oci.dynamic.routing.gateway.drg.attachment.state`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
bytesFromNetwork:
  title: Bytes From Network
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.dynamic.routing.gateway.bytes.from.network`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
bytesToNetwork:
  title: Bytes To Network
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.dynamic.routing.gateway.bytes.to.network`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
packetsFromNetwork:
  title: Packets From Network
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.dynamic.routing.gateway.packets.from.network`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
packetsToNetwork:
  title: Packets To Network
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.dynamic.routing.gateway.packets.to.network`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
packetsError:
  title: Packets with Errors
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.dynamic.routing.gateway.packets.error`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
