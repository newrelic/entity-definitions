bytesFromDrgAttachment:
  title: Bytes Sent to DRG
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.dynamic.routing.gateway.bytes.from.drg.attachment`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

bytesToDrgAttachment:
  title: Bytes Sent from DRG
  unit: BYTES_PER_SECOND
  queries:
    oci:
      select: average(`oci.dynamic.routing.gateway.bytes.to.drg.attachment`)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

packetsFromDrgAttachment:
  title: Packets Sent to DRG
  unit: COUNT
  queries:
    oci:
      select: sum(`oci.dynamic.routing.gateway.packets.from.drg.attachment`)
