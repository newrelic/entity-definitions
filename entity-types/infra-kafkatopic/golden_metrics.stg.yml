bytesInPerSecond:
  title: Bytes in per second
  unit: BYTES_PER_SECOND
  queries:
    opentelemetry:
      select: rate(sum(kafka.topic.io), 1 second)
      from: Metric
      where: metricName = 'kafka.topic.io' AND (state = 'in' OR direction = 'in')
      eventId: entity.guid
    gcp:
      select: rate(sum(gcp.managedkafka.byte_in_count), 1 second)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

bytesOutPerSecond:
  title: Bytes out per second
  unit: BYTES_PER_SECOND
  queries:
    opentelemetry:
      select: rate(sum(kafka.topic.io), 1 second)
      from: Metric
      where: metricName = 'kafka.topic.io' AND (state = 'out' OR direction = 'out')
      eventId: entity.guid
    gcp:
      select: rate(sum(gcp.managedkafka.byte_out_count), 1 second)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

messagesInPerSecond:
  title: Messages in per second
  unit: MESSAGES_PER_SECOND
  queries:
    opentelemetry:
      select: rate(sum(kafka.prod.msg.count), 1 second)
      from: Metric
      where: metricName = 'kafka.prod.msg.count'
      eventId: entity.guid
    gcp:
      select: rate(sum(gcp.managedkafka.message_in_count), 1 second)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

consumerGroupLag:
  title: "OTel: Consumer group lag"
  queries:
    opentelemetry:
      select: latest(kafka.consumer_group.lag_sum)
      from: Metric
      where: metricName = 'kafka.consumer_group.lag_sum'
      eventId: entity.guid
      facet: group
    gcp:
      select: latest(gcp.managedkafka.consumer_lag)
      from: Metric
      eventId: entity.guid
      eventName: entity.name

underReplicatedPartitions:
  unit: COUNT
  title: "NR: Under-replicated partitions"
  queries:
    newRelic:
      select: latest(topic.underReplicatedPartitions)
      from: KafkaTopicSample
      eventId: entityGuid
      eventName: entityName

partitionsWithNonPreferredLeader:
  title: "NR: Non-preferred leader Partitions"
  unit: COUNT
  queries:
    newRelic:
      select: average(topic.partitionsWithNonPreferredLeader)
      from: KafkaTopicSample
      eventId: entityGuid
      eventName: entityName
