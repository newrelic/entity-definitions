domain: INFRA
type: KAFKATOPIC
configuration:
  entityExpirationTime: DAILY
  alertable: true

synthesis:
  rules:
  # This rule is for OTEL contrib jmx kafka receivers metrics
  - ruleName: infra_kafkatopic_otel_jmxmetrics_stg
    compositeIdentifier:
      separator: ":"
      attributes:
      - topic
      - kafka.cluster.name
    compositeName:
      fragments:
      - attribute: topic
      - value: " ("
      - attribute: kafka.cluster.name
      - value: ")"
    encodeIdentifierInGUID: true
    conditions:
    - attribute: eventType
      value: Metric
    - attribute: topic
      present: true
    - attribute: instrumentation.provider
      value: opentelemetry
    - attribute: otel.library.name
      value: "io.opentelemetry.contrib.jmxmetrics"
    tags:
      instrumentation.provider:
      kafka.cluster.name:
      topic:

  - ruleName: infra_kafkatopic_otel_jmxscraper_stg
    compositeIdentifier:
      separator: ":"
      attributes:
      - topic
      - kafka.cluster.name
    compositeName:
      fragments:
      - attribute: topic
      - value: " ("
      - attribute: kafka.cluster.name
      - value: ")"
    encodeIdentifierInGUID: true
    conditions:
    - attribute: eventType
      value: Metric
    - attribute: topic
      present: true
    - attribute: instrumentation.provider
      value: opentelemetry
    - attribute: otel.library.name
      value: "io.opentelemetry.jmx"
    tags:
      instrumentation.provider:
      kafka.cluster.name:
      topic:

  - ruleName: infra_kafkatopic_otel_kafkametrics_stg
    compositeIdentifier:
      separator: ":"
      attributes:
      - topic
      - kafka.cluster.name
    compositeName:
      fragments:
      - attribute: topic
      - value: " ("
      - attribute: kafka.cluster.name
      - value: ")"
    encodeIdentifierInGUID: true
    conditions:
    - attribute: eventType
      value: Metric
    - attribute: topic
      present: true
    - attribute: instrumentation.provider
      value: opentelemetry
    - attribute: otel.library.name
      value: "github.com/open-telemetry/opentelemetry-collector-contrib/receiver/kafkametricsreceiver"
    tags:
      instrumentation.provider:
      kafka.cluster.name:
      kafka.cluster.id:
      topic:

  - ruleName: infra_kafkatopic_otel_prometheus_stg
    compositeIdentifier:
      separator: ":"
      attributes:
      - topic
      - kafka.cluster.name
    compositeName:
      fragments:
      - attribute: topic
      - value: " ("
      - attribute: kafka.cluster.name
      - value: ")"
    encodeIdentifierInGUID: true
    conditions:
    - attribute: eventType
      value: Metric
    - attribute: topic
      present: true
    - attribute: instrumentation.provider
      value: opentelemetry
    - attribute: otel.library.name
      value: "github.com/open-telemetry/opentelemetry-collector-contrib/receiver/prometheusreceiver"
    tags:
      instrumentation.provider:
      kafka.cluster.name:
      topic:

  # Log-based rule: OTel kafkareceiver logs carry topic, kafka.cluster.name, and producer.service.name.
  - ruleName: infra_kafkatopic_otel_kafkareceiver_log_stg
    compositeIdentifier:
      separator: ":"
      attributes:
      - topic
      - kafka.cluster.name
    compositeName:
      fragments:
      - attribute: topic
      - value: " ("
      - attribute: kafka.cluster.name
      - value: ")"
    encodeIdentifierInGUID: true
    conditions:
    - attribute: eventType
      value: Log
    - attribute: topic
      present: true
    - attribute: kafka.cluster.name
      present: true
    - attribute: instrumentation.provider
      value: opentelemetry
    - attribute: service.name
      present: false
    tags:
      instrumentation.provider:
      kafka.cluster.name:
      topic:
      producer.service.name:
        ttl: P1D

  # Data from Kafka integation OHI
  - ruleName: infra_kafkatopic_entityId
    identifier: entityId
    name: entityKey
    legacyFeatures:
      useNonStandardAttributes: true
      overrideGuidType: true
    conditions:
      - attribute: eventType
        value: KafkaTopicSample
    prefixedTags:
      label.:
        ttl: PT4H
    tags:
      integrationName:
        ttl: P1D
      integrationVersion:
        ttl: P1D
      reportingAgent:
        ttl: P1D

goldenTags:
- clusterName
- topic
- kafka.cluster.name
- gcp.projectId
- gcp.region

dashboardTemplates:
  newRelic:
    template: newrelic_dashboard.json
  opentelemetry:
    template: opentelemetry_dashboard.json
  # GCP Managed Kafka
  gcp:
    template: gcp_dashboard.stg.json

ownership:
  primaryOwner:
    teamName: "OnHost Agent and Integrations"
