siteHits:
  title: Site Hits
  unit: COUNT
  queries:
    azure:
      select: sum(azure.web.staticsites.SiteHits)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
siteErrors:
  title: Site Errors
  unit: COUNT
  queries:
    azure:
      select: sum(azure.web.staticsites.SiteErrors)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
cdnTotalLatency:
  title: CDN Total Latency (ms)
  unit: MS
  queries:
    azure:
      select: sum(azure.web.staticsites.CdnTotalLatency)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
dataOut:
  title: Data Out
  unit: BYTES
  queries:
    azure:
      select: sum(azure.web.staticsites.BytesSent)
      from: Metric
      eventId: entity.guid
      eventName: entity.name
