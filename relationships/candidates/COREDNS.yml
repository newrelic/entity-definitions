category: COREDNS
lookups:
  - entityTypes:
      - domain: EXT
        type: COREDNS
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: ["k8s.clusterName", "k8s.cluster.name"]
          field: k8s.clusterName
        - tagKeys: ["k8s.namespaceName", "k8s.namespace.name"]
          field: k8s.namespaceName
        - tagKeys: ["k8s.podName", "k8s.pod.name"]
          field: k8s.podName
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: NO_OP
