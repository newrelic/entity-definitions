category: KAFKATOPIC
lookups:
  - entityTypes:
      - domain: INFRA
        type: AWSMSKTOPIC
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: [ "aws.clusterName", "aws.kafka.ClusterName" ]
          field: clusterName
        - tagKeys: [ "aws.awsRegion", "aws.region" ]
          field: region
        - tagKeys: [ "aws.topic", "aws.kafka.Topic" ]
          field: topic
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: CREATE_UNINSTRUMENTED
      uninstrumented:
        type: KAFKATOPIC

  - entityTypes:
      - domain: INFRA
        type: CONFLUENTCLOUDKAFKATOPIC
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: [ "confluent.clusterBootstrapServers", "bootstrap.servers" ]
          field: bootstrapServers
        - tagKeys: [ "confluent.kafka.server.metric.topic", "topic" ]
          field: topic
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: CREATE_UNINSTRUMENTED
      uninstrumented:
        type: KAFKATOPIC

  - entityTypes:
      - domain: INFRA
        type: KAFKATOPIC
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: ["clusterName"]
          field: clusterName
        - tagKeys: ["topic"]
          field: topic
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: CREATE_UNINSTRUMENTED
      uninstrumented:
        type: KAFKATOPIC

  # Match KAFKATOPIC by producer.service.name tag — for consumers that don't carry kafka.cluster.name.
  - entityTypes:
      - domain: INFRA
        type: KAFKATOPIC
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: ["producer.service.name"]
          field: producerServiceName
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: NO_OP

  # Match KAFKATOPIC by kafka.cluster.id tag — for self-hosted clusters emitting cluster UUID.
  - entityTypes:
      - domain: INFRA
        type: KAFKATOPIC
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: ["kafka.cluster.id"]
          field: clusterId
        - tagKeys: ["topic"]
          field: topic
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: CREATE_UNINSTRUMENTED
      uninstrumented:
        type: KAFKATOPIC
