category: AWSDOCDBINSTANCE
lookups:
  # Tier 1: Most specific match - instanceId + endpoint + port
  # Pattern based on MSSQLDBINSTANCE.yml (server.address + server.port)
  - entityTypes:
      - domain: INFRA
        type: AWSDOCDBINSTANCE
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: ["aws.rds.dbInstanceIdentifier"]
          field: instanceId
        - tagKeys: ["aws.rds.endpoint"]
          field: endpoint
        - tagKeys: ["aws.rds.dbInstancePort"]
          field: port
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: NO_OP
  # Tier 2: Fallback match - instanceId + endpoint
  # Pattern based on MSSQLDBINSTANCE.yml (host.name fallback)
  - entityTypes:
      - domain: INFRA
        type: AWSDOCDBINSTANCE
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: ["aws.rds.dbInstanceIdentifier"]
          field: instanceId
        - tagKeys: ["aws.rds.endpoint"]
          field: endpoint
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: NO_OP
  # Tier 3: Guaranteed match - instanceId only (always exists on DocumentDB instances)
  # Final fallback with uninstrumented entity creation
  - entityTypes:
      - domain: INFRA
        type: AWSDOCDBINSTANCE
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: ["aws.rds.dbInstanceIdentifier"]
          field: instanceId
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: CREATE_UNINSTRUMENTED
      uninstrumented:
        type: AWSDOCDBINSTANCE