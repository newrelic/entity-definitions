category: AWSECSCLUSTER
lookups:
  # Lookup by ARN (existing relationships)
  - entityTypes:
      - domain: INFRA
        type: AWSECSCLUSTER
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: ["aws.Arn"]
          field: awsEcsClusterArn
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: NO_OP

  # Lookup by cluster name (new task relationship)
  - entityTypes:
      - domain: INFRA
        type: AWSECSCLUSTER
    tags:
      matchingMode: ALL
      predicates:
        - tagKeys: ["aws.clusterName"]
          field: awsEcsClusterName
    onMatch:
      onMultipleMatches: RELATE_ALL
    onMiss:
      action: NO_OP
