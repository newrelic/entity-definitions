# EPIC: NR-576657 (DEMO clone of NR-576327) — AFA2026 hackathon
relationships:
  # OTel Redis (plain Docker) -> OTel Container (dockerstats receiver)
  - name: OtelRedisinstanceToOtelDockerContainer
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: ["Metric", "Log"]
      - attribute: instrumentation.provider
        anyOf: ["opentelemetry"]
      - attribute: entity.type
        anyOf: ["REDISINSTANCE"]
      - attribute: container.id
        present: true
      - attribute: k8s.cluster.name
        present: false
    relationship:
      expires: PT75M
      relationshipType: IS
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: CONTAINER
          identifier:
            fragments:
              - attribute: container.id
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            attribute: entity.type

  # OTel Redis (plain Docker) -> NR native Container (ContainerSample)
  - name: OtelRedisinstanceToNrDockerContainer
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: ["Metric", "Log"]
      - attribute: instrumentation.provider
        anyOf: ["opentelemetry"]
      - attribute: entity.type
        anyOf: ["REDISINSTANCE"]
      - attribute: container.id
        present: true
      - attribute: k8s.cluster.name
        present: false
    relationship:
      expires: PT75M
      relationshipType: IS
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: CONTAINER
            valueInGuid: NA
          identifier:
            fragments:
              - value: "docker:"
              - attribute: container.id
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            attribute: entity.type

  # OTel Redis (K8s) -> OTel K8s Container (kube-state-metrics / cAdvisor / kubeletstats)
  - name: OtelRedisinstanceToOtelK8sContainer
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: ["Metric", "Log"]
      - attribute: instrumentation.provider
        anyOf: ["opentelemetry"]
      - attribute: entity.type
        anyOf: ["REDISINSTANCE"]
      - attribute: k8s.cluster.name
        present: true
      - attribute: k8s.namespace.name
        present: true
      - attribute: k8s.pod.name
        present: true
      - attribute: k8s.container.name
        present: true
    relationship:
      expires: PT75M
      relationshipType: IS
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: CONTAINER
          identifier:
            fragments:
              - attribute: k8s.cluster.name
              - value: ":"
              - attribute: k8s.namespace.name
              - value: ":"
              - attribute: k8s.pod.name
              - value: ":"
              - attribute: k8s.container.name
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            attribute: entity.type

  # OTel Redis (K8s) -> NR native K8s Container (K8sContainerSample)
  - name: OtelRedisinstanceToNrK8sContainer
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: ["Metric", "Log"]
      - attribute: instrumentation.provider
        anyOf: ["opentelemetry"]
      - attribute: entity.type
        anyOf: ["REDISINSTANCE"]
      - attribute: k8s.cluster.name
        present: true
      - attribute: k8s.namespace.name
        present: true
      - attribute: k8s.pod.name
        present: true
      - attribute: k8s.container.name
        present: true
    relationship:
      expires: PT75M
      relationshipType: IS
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: CONTAINER
            valueInGuid: NA
          identifier:
            fragments:
              - value: "k8s:"
              - attribute: k8s.cluster.name
              - value: ":"
              - attribute: k8s.namespace.name
              - value: ":"
              - attribute: k8s.pod.name
              - value: ":container:"
              - attribute: k8s.container.name
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            attribute: entity.type