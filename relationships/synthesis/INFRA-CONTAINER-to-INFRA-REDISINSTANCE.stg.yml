relationships:
  # From K8s container to redis service
  - name: ContainerContainsRedisinstance
    version: "1"
    origins:
      - OnHost Integration
    conditions: 
      - attribute: eventType
        anyOf: [ "RedisSample" ]
      - attribute: nr.entityType
        anyOf: ["RedisInstance","REDISINSTANCE"]
      - attribute: clusterName
        present: true
      - attribute: namespace
        present: true
      - attribute: namespace
        present: true
      - attribute: podName
        present: true
      - attribute: name
        present: true
    relationship:
      expires: PT75M
      relationshipType: HOSTS
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: CONTAINER
            valueInGuid: NA
          identifier:
            fragments:
              - value: "k8s:"
              - attribute: clusterName
              - value: ":"
              - attribute: namespace
              - value: ":"
              - attribute: podName
              - value: ":container:"
              - attribute: name
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entityGuid
          entityType:
            value: REDISINSTANCE

  # OpenTelemetry: Standalone Docker Container IS Redis Instance (no K8s)
  # The container and Redis instance are the same workload (1:1 identity mapping)
  # K8s is handled by INFRA-KUBERNETES_POD-to-INFRA-REDISINSTANCE.stg.yml
  - name: containerIsOtelRedisInstance
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: ["Metric"]
      - attribute: instrumentation.provider
        anyOf: ["opentelemetry"]
      - attribute: metricName
        startsWith: redis.
      - attribute: entity.type
        anyOf: ["REDISINSTANCE"]
      - attribute: container.id
        present: true
      - attribute: k8s.cluster.name
        present: false
    relationship:
      expires: PT75M
      relationshipType: IS
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: CONTAINER
            valueInGuid: NA
          identifier:
            fragments:
              - attribute: container.id
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            value: REDISINSTANCE
