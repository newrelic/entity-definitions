relationships:
  - name: kafkaBrokerServesKafkaTopic
    version: "1"
    origins:
      - OnHost Integration
    conditions:
      - attribute: event_type
        anyOf: [ "KafkaBrokerSample" ]
      - attribute: nr.entityType
        anyOf: [ "KafkaBroker" ]
      - attribute: topic
        present: true
      - attribute: clusterName
        present: true
    relationship:
      expires: P75M
      relationshipType: SERVES
      source:
        extractGuid:
          attribute: entityGuid
          entityType:
            attribute: nr.entityType
      target:
        lookupGuid:
          candidateCategory: KAFKATOPIC
          fields:
            - field: topic
              attribute: topic
            - field: clusterName
              attribute: clusterName
