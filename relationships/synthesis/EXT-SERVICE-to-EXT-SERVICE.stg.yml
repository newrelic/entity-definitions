relationships:
  - name: extServiceCallsExtServiceStgOverride
    version: "1"
    origins:
      - Distributed Tracing
    conditions:
      - attribute: eventType
        anyOf: ["Span"]
    relationship:
      expires: PT75M
      relationshipType: CALLS
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: EXT
          type:
            value: SERVICE
          identifier:
            fragments:
              - attribute: parent.service.name
            hashAlgorithm: FARM_HASH
      target:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: EXT
          type:
            value: SERVICE
          identifier:
            fragments:
              - attribute: service.name
            hashAlgorithm: FARM_HASH

  - name: extEbpfClientCallsExtEbpfServerFromClientSpanStgOverride
    version: "1"
    origins:
      - Distributed Tracing
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: ["Span", "Metric"]
      - attribute: instrumentation.name
        anyOf: ["nr_ebpf"]
      - attribute: trace_role
        anyOf: ["client"]
    relationship:
      expires: PT75M
      relationshipType: CALLS
      source:
        extractGuid:
          attribute: entity.guid
      target:
        lookupGuid:
          candidateCategory: EXTEBPFSERVER
          fields:
            - field: local_endpoint
              attribute: remote_endpoint
            - field: hostname
              attribute: remote.host.name

  - name: extEbpfServiceISextServiceStgOverride
    version: "1"
    origins:
      - Distributed Tracing
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: ["Span", "Metric", "Log"]
      - attribute: instrumentation.name
        anyOf: ["nr_ebpf"]
      - attribute: instrumentation.provider
        anyOf: ["newrelic-ebpf"]
    relationship:
      expires: PT24H
      relationshipType: IS
      source:
        extractGuid:
          attribute: entity.guid
      target:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: EXT
          type:
            value: SERVICE
          identifier:
            fragments:
              - attribute: service.name
            hashAlgorithm: FARM_HASH
