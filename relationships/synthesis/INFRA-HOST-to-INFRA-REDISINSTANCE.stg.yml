relationships:
  # OTel: Host HOSTS Redis instance (local scenario - redis on same host)
  - name: hostHostsOtelRedisinstanceLocal
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "Metric" ]
      - attribute: instrumentation.provider
        anyOf: [ "opentelemetry" ]
      - attribute: host.id
        present: true
      - attribute: entity.type
        anyOf: [ "REDISINSTANCE" ]
      - attribute: k8s.pod.name # condition to exclude k8s pod based hosts
        present: false
    relationship:
      expires: PT75M
      relationshipType: HOSTS
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: HOST
            valueInGuid: NA
          identifier:
            fragments:
              - attribute: host.id
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            value: REDISINSTANCE

  # OTel: Host MEASURES Redis instance (remote scenario - host.name based)
  - name: hostMeasuresOtelRedisinstanceRemote
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "Metric" ]
      - attribute: instrumentation.provider
        anyOf: [ "opentelemetry" ]
      - attribute: host.id
        present: true
      - attribute: entity.type
        anyOf: [ "REDISINSTANCE" ]
      - attribute: server.address
        present: true
      - attribute: k8s.pod.name # condition to exclude k8s pod based hosts
        present: false
    relationship:
      expires: PT75M
      relationshipType: MEASURES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: HOST
            valueInGuid: NA
          identifier:
            fragments:
              - attribute: host.id
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            value: REDISINSTANCE
