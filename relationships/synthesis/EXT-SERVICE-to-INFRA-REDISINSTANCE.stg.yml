relationships:
  - name: apmCallsOtelRedisInstance
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "Span" ]
      - attribute: instrumentation.provider
        anyOf: [ "opentelemetry" ]
      - attribute: entity.type
        anyOf: [ "SERVICE" ]
      - attribute: service.instance.id
        present: true
      - attribute: server.address
        present: false
    relationship:
      expires: PT75M
      relationshipType: CALLS
      source:
        extractGuid:
          attribute: entity.guid
      target:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: REDISINSTANCE
          identifier:
            fragments:
              - attribute: redis.instance.id
            hashAlgorithm: FARM_HASH
