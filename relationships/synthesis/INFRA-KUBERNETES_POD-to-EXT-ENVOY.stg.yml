relationships:
  - name: k8sPodContainsExtEnvoyStg
    version: "1"
    origins:
      - Prometheus
    conditions:
      - attribute: metricName
        startsWith: envoy_
      - attribute: instrumentation.provider
        anyOf: ["prometheus"]
      - attribute: cluster_name
        present: true
      - attribute: gateway_envoyproxy_io_owning_gateway_name
        present: true
    relationship:
      expires: PT75M
      relationshipType: CONTAINS
      source:
        lookupGuid:
          candidateCategory: KUBERNETES_POD
          fields:
            - field: k8s.clusterName
              attribute: cluster_name
            - field: k8s.namespaceName
              attribute: namespace
            - field: k8s.podName
              attribute: pod
      target:
        extractGuid:
          attribute: entity.guid
  - name: k8sPodContainsExtEnvoyOtelStg
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: metricName
        startsWith: envoy_
      - attribute: instrumentation.provider
        anyOf: ["opentelemetry"]
      - attribute: k8s.cluster.name
        present: true
      - attribute: k8s.pod.label.gateway.envoyproxy.io/owning-gateway-name
        present: true
    relationship:
      expires: PT75M
      relationshipType: CONTAINS
      source:
        lookupGuid:
          candidateCategory: KUBERNETES_POD
          fields:
            - field: k8s.clusterName
              attribute: k8s.cluster.name
            - field: k8s.namespaceName
              attribute: k8s.namespace.name
            - field: k8s.podName
              attribute: k8s.pod.name
      target:
        extractGuid:
          attribute: entity.guid
