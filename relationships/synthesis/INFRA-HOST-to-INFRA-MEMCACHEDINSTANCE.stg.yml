  # Remote scenario: Host measures remote Memcached instance
  - name: hostMeasuresMemcachedInstance
    version: "1"
    origins:
      - OnHost Integration
    conditions:
      - attribute: eventType
        anyOf: ["MemcachedSample"]
      - attribute: nr.entityType
        anyOf: ["MemcachedInstance","MEMCACHEDINSTANCE"]
      - attribute: hostname
        present: true
      - attribute: displayName
        regex: "^(?!localhost|127\\.0\\.0\\.1|::1|0\\.0\\.0\\.0).*"
      - attribute: podName # condition to exclude k8s hosts
        present: false
    relationship:
      expires: PT75M
      relationshipType: MEASURES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: HOST
            valueInGuid: NA
          identifier:
            fragments:
              - attribute: reportingAgent
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entityGuid
          entityType:
            value: MEMCACHEDINSTANCE
  - name: hostMeasuresMemcachedInstanceRule2
    version: "1"
    origins:
      - OnHost Integration
    conditions:
      - attribute: eventType
        anyOf: ["MemcachedSample"]
      - attribute: nr.entityType
        anyOf: ["MemcachedInstance","MEMCACHEDINSTANCE"]
      - attribute: hostname
        present: true
      - attribute: displayName
        regex: "^(?!localhost|127\\.0\\.0\\.1|::1|0\\.0\\.0\\.0).*"
      - attribute: podName # condition to exclude k8s hosts
        present: false
    relationship:
      expires: PT75M
      relationshipType: MEASURES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: HOST
            valueInGuid: NA
          identifier:
            fragments:
              - attribute: fullHostname
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entityGuid
          entityType:
            value: MEMCACHEDINSTANCE

  # OTel path: host hosts a memcached instance instrumented via opentelemetry-collector-contrib.
  # Source HOST GUID is built from host.id (populated by resourcedetection in the collector);
  # target is the entity already synthesized by the OTel rules in definition.stg.yml.
  - name: oTelHostHostsMemcachedInstance
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "Metric" ]
      - attribute: metricName
        startsWith: memcached.
      - attribute: instrumentation.provider
        anyOf: [ "opentelemetry" ]
      - attribute: host.id
        present: true
    relationship:
      expires: PT75M
      relationshipType: HOSTS
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: HOST
            valueInGuid: NA
          identifier:
            fragments:
              - attribute: host.id
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            value: MEMCACHEDINSTANCE
