relationships:
  - name: k8sPodContainsExtIstioServiceRequestStg
    version: "1"
    origins:
      - Prometheus
    conditions:
      - attribute: metricName
        startsWith: istio_request
      - attribute: instrumentation.provider
        anyOf: ["prometheus"]
      - attribute: cluster_name
        present: true
      - attribute: service_istio_io_canonical_name
        present: true
    relationship:
      expires: PT75M
      relationshipType: CONTAINS
      source:
        lookupGuid:
          candidateCategory: KUBERNETES_POD
          fields:
            - field: k8s.clusterName
              attribute: cluster_name
            - field: k8s.namespaceName
              attribute: namespace
            - field: k8s.podName
              attribute: pod
      target:
        extractGuid:
          attribute: entity.guid
