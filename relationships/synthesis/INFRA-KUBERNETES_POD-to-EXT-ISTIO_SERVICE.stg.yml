relationships:
  - name: k8sPodContainsExtIstioServiceRequestStg
    version: "1"
    origins:
      - Prometheus
    conditions:
      - attribute: metricName
        startsWith: istio_request
      - attribute: instrumentation.provider
        anyOf: ["prometheus"]
      - attribute: cluster_name
        present: true
      - attribute: service_istio_io_canonical_name
        present: true
    relationship:
      expires: PT75M
      relationshipType: CONTAINS
      source:
        buildGuid:
          account:
            lookup: true
          domain:
            value: INFRA
          type:
            value: KUBERNETES_POD
            valueInGuid: NA
          identifier:
            fragments:
              - value: "k8s:"
              - attribute: cluster_name
              - value: ":"
              - attribute: namespace
              - value: ":pod:"
              - attribute: pod
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
