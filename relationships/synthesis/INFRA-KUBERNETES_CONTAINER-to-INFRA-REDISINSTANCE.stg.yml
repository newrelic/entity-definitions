relationships:
  # OpenTelemetry: K8s Container IS Redis Instance (OTel K8s container)
  # Matches OTel CONTAINER entity created by kubeletstats/kube-state-metrics/cAdvisor
  - name: otelK8sContainerIsRedisInstance
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: ["Metric"]
      - attribute: instrumentation.provider
        anyOf: ["opentelemetry"]
      - attribute: metricName
        startsWith: redis.
      - attribute: entity.type
        anyOf: ["REDISINSTANCE"]
      - attribute: k8s.cluster.name
        present: true
      - attribute: k8s.namespace.name
        present: true
      - attribute: k8s.pod.name
        present: true
      - attribute: k8s.container.name
        present: true
    relationship:
      expires: PT75M
      relationshipType: IS
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: CONTAINER
          identifier:
            fragments:
              - attribute: k8s.cluster.name
              - value: ":"
              - attribute: k8s.namespace.name
              - value: ":"
              - attribute: k8s.pod.name
              - value: ":"
              - attribute: k8s.container.name
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            value: REDISINSTANCE
