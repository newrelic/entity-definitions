relationships:
  - name: k8sNamespaceContainsStatefulSet
    version: "1"
    origins:
      - Kubernetes Integration
    conditions:
      - attribute: eventType
        anyOf: [ "K8sStatefulsetSample" ]
      - attribute: entityGuid
        present: true
      - attribute: namespaceName
        present: true
      - attribute: clusterName
        present: true
    relationship:
      expires: PT75M
      relationshipType: CONTAINS
      source:
        lookupGuid:
          candidateCategory: KUBERNETES_NAMESPACE
          fields:
            - field: k8s.clusterName
              attribute: clusterName
            - field: k8s.namespaceName
              attribute: namespaceName
      target:
        extractGuid:
          attribute: entityGuid
          entityType:
            value: KUBERNETES_STATEFULSET
  - name: otelKsmK8sNamespaceContainsStatefulSet
    # use kube-state-metrics kube_statefulset_created
    version: "1"
    origins: 
      - OpenTelemetry
    conditions:
      - attribute: metricName
        anyOf: [ "kube_statefulset_created" ]
    relationship:
      expires: PT75M
      relationshipType: CONTAINS
      source:
        lookupGuid:
          candidateCategory: KUBERNETES_NAMESPACE
          fields:
            - field: k8s.clusterName
              attribute: k8s.cluster.name
            - field: k8s.namespaceName
              attribute: k8s.namespace.name
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            value: KUBERNETES_STATEFULSET