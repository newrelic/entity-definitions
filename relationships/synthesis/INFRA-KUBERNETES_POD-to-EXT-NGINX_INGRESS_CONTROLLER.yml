relationships:
  - name: k8sPodContainsExtNginxIngressController
    version: "1"
    origins:
      - Kubernetes Integration
    conditions:
      - attribute: eventType
        anyOf: ["Metric"]
      - attribute: entity.type
        anyOf: ["KUBERNETES_POD"]
    relationship:
      expires: PT75M
      relationshipType: CONTAINS
      source:
        extractGuid:
          attribute: entity.guid
      target:
        lookupGuid:
          candidateCategory: NGINXINGRESS
          fields:
            - field: k8s.clusterName # cluster of ext-nginx_ingress_controller
              attribute: cluster_name # cluster of pod
            - field: k8s.namespaceName # namespace of ext-nginx_ingress_controller
              attribute: namespace # namespace of pod
            - field: k8s.podName # podName of ext-nginx_ingress_controller
              attribute: pod # podName of pod
  - name: k8sPodContainsExtNginxIngressControllerOtel
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: ["Metric"]
      - attribute: entity.type
        anyOf: ["KUBERNETES_POD"]
    relationship:
      expires: PT75M
      relationshipType: CONTAINS
      source:
        extractGuid:
          attribute: entity.guid
      target:
        lookupGuid:
          candidateCategory: NGINXINGRESS
          fields:
            - field: k8s.clusterName # cluster of ext-nginx_ingress_controller
              attribute: k8s.cluster.name # cluster of pod
            - field: k8s.namespaceName # namespace of ext-nginx_ingress_controller
              attribute: k8s.namespace.name # namespace of pod
            - field: k8s.podName # podName of ext-nginx_ingress_controller
              attribute: k8s.pod.name # podName of pod
