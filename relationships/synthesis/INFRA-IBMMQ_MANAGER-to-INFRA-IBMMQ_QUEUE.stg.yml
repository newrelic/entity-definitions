# ---------------------------------------------------------------------------
# Staging-only override of INFRA-IBMMQ_MANAGER-to-INFRA-IBMMQ_QUEUE.yml.
#
# Per the repo's deployment model (see top-level README.md > "Deploying to
# Staging"), this .stg.yml REPLACES the original .yml in STG while PROD
# continues to use the original unchanged. Because it is a full replacement,
# every relationship rule that should be active in STG must be present here
# -- not only the new ones.
#
# Relationship rule names must be globally unique across all files (the
# validate_relationship_synthesis_rules check enforces this), so the nri-mq
# rule below is renamed with the "StgOverride" suffix per the README's
# guidance ("Verify override rule identifiers are different from originals").
#
# This file therefore contains TWO rules:
#
#   1. ibmMqManagerManagesIbmMqQueueStgOverride (nri-mq pipeline)
#      - Mirrors the original ibmMqManagerManagesIbmMqQueue rule.
#      - Source GUID is built from targetName + qmgr (matches the nri-mq
#        synthesis identifier in definition.stg.yml > "Pipeline 1").
#      - Adds a `instrumentation.provider: present: false` condition so OTel
#        telemetry does not trigger this rule.
#      - Status: carried over from the original .yml so STG keeps forming
#        the manager->queue link for nri-mq data.
#
#   2. ibmMqManagerManagesIbmMqQueueOtel (OpenTelemetry pipeline)
#      - Source GUID is built from host.name + qmgr with FARM_HASH (matches
#        the OTel synthesis identifier and `encodeIdentifierInGUID: true`
#        flag in definition.stg.yml > "Pipeline 2").
#      - Filters on instrumentation.provider=opentelemetry and
#        otel.library.name=ibmmq so it only fires for IBM mq_otel telemetry.
#      - Status: new in this .stg.yml.
# ---------------------------------------------------------------------------

relationships:
  # --- Rule 1: nri-mq pipeline (carried over, renamed for STG uniqueness) ---
  # Source manager GUID is built from targetName + qmgr because that is how
  # the nri-mq pipeline identifies the IBMMQ_MANAGER entity. The
  # `instrumentation.provider: present: false` condition keeps OTel data out.
  - name: ibmMqManagerManagesIbmMqQueueStgOverride
    version: "1"
    origins:
      - Metric API
    conditions:
      - attribute: eventType
        anyOf: [ "MetricRaw" ]
      - attribute: entity.type
        anyOf: [ "IBMMQ_QUEUE" ]
      - attribute: instrumentation.provider
        present: false
    relationship:
      expires: PT75M
      relationshipType: MANAGES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: IBMMQ_MANAGER
          identifier:
            fragments:
              - attribute: "targetName"
              - value: ":"
              - attribute: "qmgr"
            hashAlgorithm: IDENTITY
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            attribute: entity.type

  # --- Rule 2: OpenTelemetry pipeline (new in STG) ---
  # Source manager GUID is built from host.name + qmgr with FARM_HASH,
  # matching the OTel synthesis rule in infra-ibmmq_manager/definition.stg.yml
  # which uses `encodeIdentifierInGUID: true`.
  - name: ibmMqManagerManagesIbmMqQueueOtel
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "MetricRaw" ]
      - attribute: entity.type
        anyOf: [ "IBMMQ_QUEUE" ]
      - attribute: instrumentation.provider
        anyOf: [ "opentelemetry" ]
      - attribute: otel.library.name
        anyOf: [ "ibmmq" ]
    relationship:
      expires: PT75M
      relationshipType: MANAGES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: IBMMQ_MANAGER
          identifier:
            fragments:
              - attribute: "host.name"
              - value: ":"
              - attribute: "qmgr"
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            attribute: entity.type
