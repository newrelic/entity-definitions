# Staging override: production (nri-mq) MANAGES relationship + the OpenTelemetry one.
relationships:
  # nri-mq path: build the source manager GUID from qmgr (FARM_HASH) to match the manager entity (identifier qmgr, encodeIdentifierInGUID). Renamed *PrometheusStg (rel names must be globally unique).
  - name: ibmMqManagerManagesIbmMqQueuePrometheusStg
    version: "1"
    origins:
      - Metric API
    conditions:
      - attribute: eventType
        anyOf: [ "MetricRaw" ]
      - attribute: entity.type
        anyOf: [ "IBMMQ_QUEUE" ]
    relationship:
      expires: PT75M
      relationshipType: MANAGES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: IBMMQ_MANAGER
          identifier:
            fragments:
              - attribute: "qmgr"
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            attribute: entity.type

  # OpenTelemetry: build the source manager GUID from qmgr (FARM_HASH) to match the OTel manager entity (identifier qmgr, encodeIdentifierInGUID).
  - name: ibmMqManagerManagesIbmMqQueueStg
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "MetricRaw" ]
      - attribute: entity.type
        anyOf: [ "IBMMQ_QUEUE" ]
      - attribute: instrumentation.provider
        anyOf: [ "opentelemetry" ]
    relationship:
      expires: PT75M
      relationshipType: MANAGES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: IBMMQ_MANAGER
          identifier:
            fragments:
              - attribute: "qmgr"
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            value: IBMMQ_QUEUE
