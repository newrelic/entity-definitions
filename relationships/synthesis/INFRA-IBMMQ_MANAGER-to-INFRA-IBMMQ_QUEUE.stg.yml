# Staging override: nri-mq + OpenTelemetry MANAGES relationships.
relationships:
  # nri-mq path: source manager GUID from qmgr (FARM_HASH); renamed *PrometheusStg for global rel-name uniqueness.
  - name: ibmMqManagerManagesIbmMqQueuePrometheusStg
    version: "1"
    origins:
      - Metric API
    conditions:
      - attribute: eventType
        anyOf: [ "Metric" ]
      - attribute: entity.type
        anyOf: [ "IBMMQ_QUEUE" ]
      - attribute: qmgr
        present: true
      - attribute: targetName
        present: true
      - attribute: instrumentation.provider
        present: false
    relationship:
      expires: PT75M
      relationshipType: MANAGES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: IBMMQ_MANAGER
          identifier:
            fragments:
              - attribute: targetName
              - value: ":"
              - attribute: qmgr
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entityGuid
          entityType:
            attribute: IBMMQ_QUEUE

  # OpenTelemetry path: source manager GUID from qmgr (FARM_HASH).
  - name: ibmMqManagerManagesIbmMqQueueStg
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "Metric" ]
      - attribute: entity.type
        anyOf: [ "IBMMQ_QUEUE" ]
      - attribute: instrumentation.provider
        anyOf: [ "opentelemetry" ]
      - attribute: qmgr
        present: true
      - attribute: target.name
        present: true
    relationship:
      expires: PT75M
      relationshipType: MANAGES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: IBMMQ_MANAGER
          identifier:
            fragments:
              - attribute: target.name
              - value: ":"
              - attribute: qmgr
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            value: IBMMQ_QUEUE
