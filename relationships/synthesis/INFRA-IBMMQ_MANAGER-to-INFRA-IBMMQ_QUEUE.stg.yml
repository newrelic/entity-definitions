# Staging override of INFRA-IBMMQ_MANAGER-to-INFRA-IBMMQ_QUEUE.yml.
# Carries the production (nri-mq) MANAGES relationship verbatim AND adds the OpenTelemetry one, so
# the staging environment builds manager->queue relationships from BOTH pipelines. Production
# (.yml) is left untouched.
relationships:
  # --- Production (nri-mq) relationship, carried over from the .yml. Source manager GUID uses the
  #     IDENTITY hash on targetName:qmgr to match the prod manager synthesis. Renamed with a
  #     -PrometheusStg suffix because relationship names must be globally unique across prod + stg. ---
  - name: ibmMqManagerManagesIbmMqQueuePrometheusStg
    version: "1"
    origins:
      - Metric API
    conditions:
      - attribute: eventType
        anyOf: [ "MetricRaw" ]
      - attribute: entity.type
        anyOf: [ "IBMMQ_QUEUE" ]
    relationship:
      expires: PT75M
      relationshipType: MANAGES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: IBMMQ_MANAGER
          identifier:
            fragments:
              - attribute: "targetName"
              - value: ":"
              - attribute: "qmgr"
            hashAlgorithm: IDENTITY
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            attribute: entity.type

  # --- OpenTelemetry relationship. Source manager GUID built from targetName + ibmmq.queue_manager.name
  #     with FARM_HASH to match the OTel manager synthesis rule's encodeIdentifierInGUID: true. ---
  - name: ibmMqManagerManagesIbmMqQueueStg
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "MetricRaw" ]
      - attribute: entity.type
        anyOf: [ "IBMMQ_QUEUE" ]
      - attribute: instrumentation.provider
        anyOf: [ "opentelemetry" ]
    relationship:
      expires: PT75M
      relationshipType: MANAGES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: IBMMQ_MANAGER
          identifier:
            fragments:
              - attribute: "targetName"
              - value: ":"
              - attribute: "ibmmq.queue_manager.name"
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            value: IBMMQ_QUEUE
