relationships:
  - name: k8sHostHostsPod
    version: "1"
    origins:
      - Kubernetes Integration
    conditions:
      - attribute: eventType
        anyOf: ["K8sPodSample"]
    relationship:
      expires: PT75M
      relationshipType: HOSTS
      source:
        lookupGuid:
          candidateCategory: HOST
          fields:
            - field: host.name # hostname of host candidate
              attribute: nodeName # node hostname from pod
            - field: k8s.clusterName # cluster name of host candidate
              attribute: clusterName # cluster name from pod
      target:
        extractGuid:
          attribute: entityGuid
          entityType:
            value: KUBERNETES_POD
  - name: otelKsmK8sHostHostsPod
    # use kube-state-metrics system metric
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: metricName
        startsWith: system.
      - attribute: eventType
        anyOf: ["Metric"]
      - attribute: newrelic.source
        anyOf: ["api.metrics.otlp"]
      # if service.name is present, it's a service, not a host
      - attribute: service.name
        present: false
      # if container.id is present, it's a container, not a host
      - attribute: container.id
        present: false
      - attribute: k8s.cluster.name
        present: true
    relationship:
      expires: PT75M
      relationshipType: HOSTS
      source:
        extractGuid:
          attribute: entity.guid
      target:
        extractGuid:
          attribute: entityGuid
          entityType:
            value: KUBERNETES_POD
