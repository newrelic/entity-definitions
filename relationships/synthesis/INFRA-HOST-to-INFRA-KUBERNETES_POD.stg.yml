relationships:
  - name: k8sHostHostsPod
    version: "1"
    origins:
      - Kubernetes Integration
    conditions:
      - attribute: eventType
        anyOf: ["K8sPodSample"]
    relationship:
      expires: PT75M
      relationshipType: HOSTS
      source:
        lookupGuid:
          candidateCategory: HOST
          fields:
            - field: host.name # hostname of host candidate
              attribute: nodeName # node hostname from pod
            - field: k8s.clusterName # cluster name of host candidate
              attribute: clusterName # cluster name from pod
      target:
        extractGuid:
          attribute: entityGuid
          entityType:
            value: KUBERNETES_POD
  - name: otelKsmK8sHostHostsPod
    # use kube-state-metrics kube_pod_info metric
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: metricName
        anyOf: ["kube_pod_info"]
      - attribute: k8s.node.name
        present: true
    relationship:
      expires: PT75M
      relationshipType: HOSTS
      source:
        lookupGuid:
          candidateCategory: HOST
          fields:
            - field: host.name
              attribute: k8s.node.name
            - field: k8s.clusterName
              attribute: k8s.cluster.name
      target:
        extractGuid:
          attribute: entityGuid
          entityType:
            value: KUBERNETES_POD
