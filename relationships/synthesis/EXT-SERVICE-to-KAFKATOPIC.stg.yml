  - name: extServiceCallsAwsMskTopic_ExplicitStgOverride
    version: "1"
    origins:
      - Distributed Tracing
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "Span", "Log" ]
      - attribute: newrelic.source
        anyOf: [ "api.traces.otlp", "api.logs.otlp" ]
      - attribute: entity.type
        anyOf: [ "SERVICE" ]
      - attribute: newrelic.aws_metric_streams.arn
        regex: "^arn:aws:kafka:[^:]*:[^:]*:cluster/[^:]*"
    relationship:
      expires: PT75M
      relationshipType: CALLS
      source:
        extractGuid:
          attribute: entity.guid
      target:
        lookupGuid:
          candidateCategory: KAFKATOPIC_EXPLICIT
          fields:
            - field: cloudResourceId
              attribute: newrelic.aws_metric_streams.arn

  - name: apmProducesOtelKafkaTopicStgOverrideExp
    version: "1"
    origins:
      - Distributed Tracing
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "Metric" ]
      - attribute: instrumentation.provider
        anyOf: [ "opentelemetry" ]
      - attribute: metricName
        startsWith: "kafka.producer"
      - attribute: entity.type
        anyOf: [ "SERVICE" ]
      - attribute: kafka.cluster.name
        present: true
      - attribute: topic
        present: true
    relationship:
      expires: PT75M
      relationshipType: PRODUCES
      source:
        extractGuid:
          attribute: entity.guid
      target:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: KAFKATOPIC
          identifier:
            fragments:
              - attribute: topic
              - value: ":"
              - attribute: kafka.cluster.name
            hashAlgorithm: FARM_HASH

  - name: apmConsumesOtelKafkaTopicStgOverrideExp
    version: "1"
