  # kafkareceiver log → producer EXT-SERVICE PRODUCES KAFKATOPIC via producer.service.name header
  - name: extServiceProducesSelfHostKafkaTopicLogStg
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: [ "Log" ]
      - attribute: newrelic.source
        anyOf: [ "api.logs.otlp" ]
      - attribute: instrumentation.provider
        anyOf: [ "opentelemetry" ]
      - attribute: topic
        present: true
      - attribute: kafka.cluster.name
        present: true
      - attribute: producer.service.name
        present: true
    relationship:
      expires: PT75M
      relationshipType: PRODUCES
      source:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: EXT
          type:
            value: SERVICE
          identifier:
            fragments:
              - attribute: producer.service.name
            hashAlgorithm: FARM_HASH
      target:
        buildGuid:
          account:
            attribute: accountId
          domain:
            value: INFRA
          type:
            value: KAFKATOPIC
          identifier:
            fragments:
              - attribute: topic
              - value: ":"
              - attribute: kafka.cluster.name
            hashAlgorithm: FARM_HASH

