relationships:
  # Kubernetes Pod CONTAINS HAProxy instance (OpenTelemetry)
  # When HAProxy runs in a K8s pod (Ingress Controller, sidecar, or standalone deployment),
  # the pod entity contains the HAProxy instance entity.
  # Requires: resourcedetection processor with k8s detector (provides k8s.* attributes).
  - name: oTelK8sPodContainsHaproxyInstance
    version: "1"
    origins:
      - OpenTelemetry
    conditions:
      - attribute: eventType
        anyOf: ["Metric"]
      - attribute: metricName
        startsWith: haproxy.
      - attribute: instrumentation.provider
        anyOf: ["opentelemetry"]
      - attribute: k8s.cluster.name
        present: true
      - attribute: k8s.namespace.name
        present: true
      - attribute: k8s.pod.name
        present: true
    relationship:
      expires: PT75M
      relationshipType: CONTAINS
      source:
        buildGuid:
          account:
            lookup: true
          domain:
            value: INFRA
          type:
            value: KUBERNETES_POD
          identifier:
            fragments:
              - attribute: k8s.cluster.name
              - value: ":"
              - attribute: k8s.namespace.name
              - value: ":"
              - attribute: k8s.pod.name
            hashAlgorithm: FARM_HASH
      target:
        extractGuid:
          attribute: entity.guid
          entityType:
            value: HAPROXYINSTANCE
