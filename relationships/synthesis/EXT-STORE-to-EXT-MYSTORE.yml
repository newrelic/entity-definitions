relationships:
  - name: extStoreContainsMystore
    version: "1"
    origins:
      - Event API
    conditions:
      - attribute: eventType
        anyOf: [ "MyStore_FileSize_SQL" ]
      - attribute: FileName
        anyOf: [ "SDM" ]
    relationship:
      expires: P75M
      relationshipType: CONTAINS
      source:
        extractGuid:
          attribute: entity.guid
      target:
        lookupGuid:
          candidateCategory: MYSTORE
          fields:
            - field: marketName
              attribute: market
            - field: storeNumber
              attribute: store.number
