relationships:
  - name: apmServiceCallsRedis
    version: "1"
    origins:
      - APM Metrics
    conditions:
      - attribute: metricName
        regex: "^Datastore/instance/Redis/[^/;]*/.*"
    relationship:
      expires: PT75M
      relationshipType: CALLS
      source:
        extractGuid:
          attribute: entity.guid
      target:
        lookupGuid:
          candidateCategory: REDIS
          fields:
            - field: endpoint
              attribute: metricName__4
            - field: port
              attribute: metricName__5