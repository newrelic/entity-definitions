relationships:
  - name: extStoreContainsEprod
    version: "1"
    origins:
      - Event API
    conditions:
      - attribute: eventType
        anyOf: [ "Log" ]
      - attribute: newrelic.source
        anyOf: [ "api.logs" ]
      - attribute: device.type
        anyOf: [ "EPR" ]
    relationship:
      expires: P75M
      relationshipType: CONTAINS
      source:
        extractGuid:
          attribute: entity.guid
      target:
        lookupGuid:
          candidateCategory: EPROD
          fields:
            - field: marketName
              attribute: market
            - field: storeNumber
              attribute: store.number
